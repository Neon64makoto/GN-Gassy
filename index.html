<!DOCTYPE html>
<html>
<head>
  <title>GN-Gassy</title>
  <meta charset="UTF-8">
</head>

<body style="background:black; color:white;">

<h1>GN-Gassy</h1>

<hr>

<button onclick="load('home')">Home</button>
<button onclick="load('calc')">Calculators</button>
<button onclick="load('games')">Games</button>
<button onclick="load('about')">About</button>

<hr>

<div id="content">Loading...</div>

<script>
// -------- PAGES --------
const pages = {

home: `
  <h2>Home</h2>
  <p>Welcome to GN-Gassy.</p>

  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="200">
  <br><br>
  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="200">
`,

calc: `
  <h2>Calculators</h2>
  <button onclick="showCalc('simple')">Simple</button>
  <button onclick="showCalc('volume')">Volumes</button>
  <button onclick="showCalc('graph')">Graph</button>
  <div id="calcContent"></div>
`,

games: `
  <h2>Scratch Games</h2>

  <table border="1">
    <tr>
      <td width="200" valign="top">
        <h3>Controls</h3>
        <p id="controlsText">Under Construction</p>
      </td>

      <td align="center">
        <button onclick="prevGame()">◀</button><br><br>

        <iframe id="scratchFrame"
          src="https://turbowarp.org/1143765424/embed?addons=pause&fps=60"
          width="500" height="350">
        </iframe>

        <br><br>
        <button onclick="nextGame()">▶</button>
      </td>

      <td width="200" valign="top">
        <h3>Credits</h3>
        <p id="creditsText">Under Construction</p>
      </td>
    </tr>
  </table>

  <h3 id="gameTitle">Sisyphean Escalator</h3>
`,

about: `
  <h2>About</h2>
  <p>GN-Gassy tools site.</p>
`
};

// -------- LOAD --------
function load(page){
  document.getElementById("content").innerHTML = pages[page];
}

// -------- CALCS --------
function showCalc(type){
  const c = document.getElementById("calcContent");

  if(type==="simple"){
    c.innerHTML = `
      <input id="simpleInput" placeholder="2+2*3">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  }

  if(type==="volume"){
    c.innerHTML = `
      Cube <input id="cube"><button onclick="volCube()">Calc</button><p id="o1"></p>
      Sphere <input id="sphere"><button onclick="volSphere()">Calc</button><p id="o2"></p>
      L<input id="l"> W<input id="w"> H<input id="h"><button onclick="volRect()">Calc</button><p id="o3"></p>
      R<input id="cr"> H<input id="ch"><button onclick="volCyl()">Calc</button><p id="o4"></p>
      Base<input id="pb"> H<input id="ph"><button onclick="volPyr()">Calc</button><p id="o5"></p>
    `;
  }

  if(type==="graph"){
    c.innerHTML = `
      X <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>

      y=<input id="eq1"><br>
      y=<input id="eq2"><br>
      y=<input id="eq3"><br>
      y=<input id="eq4"><br><br>

      <button onclick="drawGraph()">Graph</button><br><br>

      <canvas id="grid" width="400" height="400" style="border:1px solid white;"></canvas>
    `;
  }
}

// -------- SIMPLE --------
function calcSimple(){
  try{
    simpleOut.innerText = eval(simpleInput.value);
  }catch{
    simpleOut.innerText = "Error";
  }
}

// -------- VOLUME --------
function volCube(){ o1.innerText=cube.value*cube.value*cube.value; }
function volSphere(){ o2.innerText=(4/3)*Math.PI*sphere.value*sphere.value*sphere.value; }
function volRect(){ o3.innerText=l.value*w.value*h.value; }
function volCyl(){ o4.innerText=Math.PI*cr.value*cr.value*ch.value; }
function volPyr(){ o5.innerText=(pb.value*ph.value)/3; }

// -------- PARSER --------
function parseEq(eq){
  eq = eq.replace(/\s+/g,"");
  eq = eq.replace(/\^/g,"**");
  eq = eq.replace(/(\d)(x)/g,"$1*$2");
  eq = eq.replace(/(x)(\d)/g,"$1*$2");
  eq = eq.replace(/(\d)\(/g,"$1*(");
  eq = eq.replace(/x\(/g,"x*(");
  eq = eq.replace(/sin/g,"Math.sin");
  eq = eq.replace(/cos/g,"Math.cos");
  eq = eq.replace(/tan/g,"Math.tan");
  eq = eq.replace(/sqrt/g,"Math.sqrt");
  return eq;
}

// -------- GRAPH --------
function drawGraph(){
  const canvas = document.getElementById("grid");
  const ctx = canvas.getContext("2d");

  let xmin=+xmin.value, xmax=+xmax.value;
  let ymin=+ymin.value, ymax=+ymax.value;

  function X(x){ return (x-xmin)/(xmax-xmin)*400; }
  function Y(y){ return 400-(y-ymin)/(ymax-ymin)*400; }

  ctx.clearRect(0,0,400,400);

  ctx.beginPath();
  for(let i=0;i<=10;i++){
    let x=xmin+(xmax-xmin)/10*i;
    let y=ymin+(ymax-ymin)/10*i;
    ctx.moveTo(X(x),0); ctx.lineTo(X(x),400);
    ctx.moveTo(0,Y(y)); ctx.lineTo(400,Y(y));
  }
  ctx.strokeStyle="#444";
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(X(0),0); ctx.lineTo(X(0),400);
  ctx.moveTo(0,Y(0)); ctx.lineTo(400,Y(0));
  ctx.strokeStyle="white";
  ctx.stroke();

  [eq1.value,eq2.value,eq3.value,eq4.value].forEach((eq,i)=>{
    if(!eq) return;
    let p=parseEq(eq);
    ctx.beginPath();
    let first=true;
    for(let x=xmin;x<=xmax;x+=(xmax-xmin)/200){
      let y;
      try{ y=eval(p.replaceAll("x","("+x+")")); }catch{ continue; }
      let px=X(x), py=Y(y);
      if(first){ ctx.moveTo(px,py); first=false; }
      else ctx.lineTo(px,py);
    }
    ctx.strokeStyle=["red","blue","green","yellow"][i%4];
    ctx.stroke();
  });
}

// -------- GAMES --------
const games = [
"https://turbowarp.org/1143765424/embed?addons=pause&fps=60",
"https://turbowarp.org/1075310827/embed?addons=pause&fps=60",
"https://turbowarp.org/941803602/embed?addons=pause&fps=60",
"https://turbowarp.org/973637218/embed?addons=pause&fps=60",
"https://turbowarp.org/883776962/embed?addons=pause&fps=60",
"https://turbowarp.org/898492644/embed?addons=pause&fps=60",
"https://turbowarp.org/916303075/embed?addons=pause&fps=60",
"https://turbowarp.org/978483855/embed?addons=pause&fps=60",
"https://turbowarp.org/959847748/embed?addons=pause&fps=60"
];

const titles = [
"Sisyphean Escalator","Gambling but Mid","Laser Dodge","Goober Dodger",
"Neon's Hostile Road","Mid Cookie Clicker","Asteroid Assault",
"Reel 'Em In","Rat Catcher"
];

let currentIndex = 0;

function updateGame(){
  const f=document.getElementById("scratchFrame");
  if(!f) return;
  f.src=games[currentIndex];
  gameTitle.innerText=titles[currentIndex];
}

function nextGame(){ currentIndex=(currentIndex+1)%games.length; updateGame(); }
function prevGame(){ currentIndex=(currentIndex-1+games.length)%games.length; updateGame(); }

// init
load("home");
</script>

</body>
</html>
