<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN-Neon</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --panel-alt: #151515;
      --border: #333;
      --border-strong: #444;
      --text: #fff;
      --muted: #b3b3b3;
      --accent: #0006ff;
      --accent-soft: rgba(0, 0, 200, 0.14);
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.32);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-size: 16px;
    }

    body {
      background: #000;
      color: var(--text);
      font-family: Arial, sans-serif;
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      transition: opacity 0.5s ease;
    }

    /* Splash / Loading Overlay */
    #splashOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(45deg, #0a0a0a 25%, #1a1a2e 25%, #1a1a2e 50%, #0a0a0a 50%, #0a0a0a 75%, #1a1a2e 75%, #1a1a2e);
      background-size: 40px 40px;
      animation: loading-stripes 0.8s linear infinite;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #splashOverlay.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    #splashText {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px #0044ff;
      letter-spacing: 4px;
      text-align: center;
      pointer-events: none;
    }

    #splashSubtext {
      margin-top: 1rem;
      color: #7799ff;
      font-size: 1rem;
      pointer-events: none;
    }

    @keyframes loading-stripes {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* Styled scrollbars */
    ::-webkit-scrollbar { width: 12px; height: 12px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #0600ff; border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: #0044ff; }

    body.video-bg { background: none; position: relative; }
    #videoBg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    button, input, textarea { font: inherit; }

    button {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 1rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: #0900ad;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    button:hover {
      background: #0044ff;
      border-color: #1100ff;
      box-shadow: 0 0 35px rgba(0, 0, 255, 0.95);
      transform: translateY(-1px);
    }

    input, textarea {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 0.75rem;
      color: var(--text);
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }

    /* ─── TOP BAR ─────────────────────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(17, 17, 17, 0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(10px);
      padding: 0.75rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.4s;
    }

    .topbar.hidden { transform: translateY(-100%); }
    .topbar.ui-hidden { opacity: 0; pointer-events: none; }
    .topbar.ui-hidden.hover-reveal { opacity: 1; pointer-events: auto; transform: translateY(0); }

    .topbar-row1 {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 1rem;
      position: relative;
      padding: 0 1rem;
    }

    .topbar-brand {
      position: absolute;
      left: 1.5rem;
      font-size: 1.8rem; /* Bigger logo */
      font-weight: bold;
      color: #0600ff;
      letter-spacing: 1px;
      text-shadow: 0 0 10px rgba(0, 6, 255, 0.5);
    }

    .nav { display: flex; flex-wrap: wrap; justify-content: center; }

    .topbar-right {
      position: absolute;
      right: 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    #volumeSlider {
      -webkit-appearance: none;
      width: 100px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      outline: none;
      border: 1px solid #333;
      cursor: pointer;
    }

    #volumeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px;
      background: #0044ff;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 68, 255, 0.8);
      border: 1px solid #fff;
    }

    /* ─── MUSIC CONTROLS ──────────────────────────────────────────────── */
    .music-controls {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      padding: 0.45rem 1rem 0.6rem;
      border-top: 1px solid rgba(0, 0, 200, 0.25);
      margin-top: 0.4rem;
    }

    .music-info { display: flex; flex-direction: column; align-items: center; line-height: 1.25; }
    .music-title { font-size: 0.95rem; font-weight: bold; color: #fff; }
    .music-artist { font-size: 0.8rem; color: #7799ff; }
    .music-btn-row { display: flex; align-items: center; gap: 0.25rem; }
    .music-btn {
      margin: 0; padding: 0.35rem 0.65rem;
      font-size: 1rem; background: transparent;
      border: 1px solid rgba(0, 0, 200, 0.45);
      border-radius: 6px; color: #aac0ff;
      cursor: pointer;
    }
    .music-btn:hover { background: rgba(0, 0, 255, 0.25); border-color: #0044ff; color: #fff; }
    .music-btn.active-loop { background: rgba(0, 0, 255, 0.35); border-color: #0044ff; color: #fff; }

    .music-seek-row { display: flex; align-items: center; gap: 0.5rem; width: 100%; }
    .music-time { font-size: 0.78rem; color: #7799ff; min-width: 38px; text-align: center; }
    #seekBar {
      flex: 1; -webkit-appearance: none; appearance: none;
      height: 4px; border-radius: 2px;
      background: linear-gradient(to right, #0044ff 0%, #333 0%);
      outline: none; cursor: pointer;
    }
    #seekBar::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #0044ff; }

    /* ─── MAIN CONTENT ────────────────────────────────────────────────── */
    .page-shell {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 8.5rem 1.5rem 5rem;
      transition: opacity 0.4s;
    }
    .page-shell.ui-hidden { opacity: 0; pointer-events: none; }

    .site-title { margin: 0.5rem 0 1.5rem; text-align: center; font-size: 3rem; }

    .panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), rgba(0, 0, 150, 0.5));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 2rem;
    }

    /* Home Grid Restoration */
    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
      gap: 1.5rem;
      align-items: start;
    }
    .hero-panel h2, .patch-panel h3 { margin-top: 0; font-size: 2rem; }
    .lead { color: #d2d2d2; line-height: 1.6; font-size: 1.15rem; }
    .image-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .image-card { background: var(--panel-alt); border: 1px solid var(--border); border-radius: 12px; padding: 1rem; }
    .image-card img { width: 100%; border-radius: 8px; }
    .image-card span { display: block; margin-top: 0.75rem; color: var(--muted); }

    .patch-panel { max-height: 600px; overflow-y: auto; display: flex; flex-direction: column; }
    .version-chip { display: inline-flex; align-items: center; gap: 0.75rem; margin-bottom: 0.5rem; padding: 0.5rem 0.8rem; border-radius: 999px; border: 1px solid rgba(0, 0, 225, 1); background: rgba(0, 0, 150, 0.08); color: var(--accent); font-size: 0.9rem; }
    .patch-list { margin: 1rem 0 0; padding-left: 1.5rem; line-height: 1.65; }

    /* Tools / IDE / Canvas / Chat */
    .button-row { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 1.5rem; }
    #ideContainer { display: flex; flex-direction: column; gap: 1rem; }
    #ideInput { width: 100%; height: 300px; background: #111; color: #0f0; font-family: monospace; }
    #ideOutput { width: 100%; height: 300px; background: white; border-radius: 8px; border: none; }
    #paintingCanvas { background: white; border-radius: 8px; display: block; margin: 0 auto; }
    #chatContainer { height: 400px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; }
    #chatLog { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .chat-msg { padding: 0.5rem 0.8rem; border-radius: 8px; max-width: 80%; }
    .user-msg { align-self: flex-end; background: #0044ff; color: white; }
    .bot-msg { align-self: flex-start; background: #222; color: #7799ff; }
    .chat-input-row { display: flex; padding: 0.5rem; background: #111; border-top: 1px solid #333; }
    #chatInput { flex: 1; margin: 0; }

    /* Games Layout */
    .games-layout { display: flex; gap: 1rem; align-items: flex-start; justify-content: center; width: 100%; }
    .sideBox { width: 20%; padding: 1.25rem; background: #111; border: 1px solid #333; border-radius: 12px; height: 70vh; overflow-y: auto; }
    .centerBox { width: 55%; text-align: center; }
    #scratchFrame { width: 100%; height: 60vh; border-radius: 10px; border: none; background: #000; }

    .embed-container { width: 100%; height: 80vh; border-radius: 12px; overflow: hidden; border: 1px solid #333; }
    .embed-container iframe { width: 100%; height: 100%; border: none; }

    #visualizerCanvas { position: fixed; bottom: 0; left: 0; width: 100%; height: 100vh; z-index: -1; pointer-events: none; }
    .version-tag { position: fixed; bottom: 5px; right: 10px; color: gray; font-size: 0.85rem; z-index: 200; }

    @media (max-width: 960px) {
      .topbar-brand { position: static; margin-bottom: 0.5rem; }
      .home-grid { grid-template-columns: 1fr; }
      .sideBox { display: none; }
      .centerBox { width: 100%; }
    }
  </style>
</head>
<body class="video-bg">
  <audio id="bgMusic" style="display:none;" crossorigin="anonymous"></audio>

  <div id="splashOverlay" onclick="enterSite()">
    <div id="splashText">LOADING...</div>
    <div id="splashSubtext">Please wait for the assets to load</div>
  </div>

  <div class="topbar" id="topbar">
    <div class="topbar-row1">
      <div class="topbar-brand">GN-Neon</div>
      <nav class="nav">
        <button onclick="load('home')">Home</button>
        <button onclick="load('tools')">Tools</button>
        <button onclick="load('games')">Games</button>
        <button onclick="load('creations')">Creations</button>
        <button onclick="load('unblocked')">Unblocked</button>
        <button onclick="load('about')">About</button>
        <button onclick="toggleVisualizerMode()" id="vizModeBtn" style="border: 1px solid #0044ff; background: rgba(0,0,255,0.1);">Visualizer</button>
      </nav>
      <div class="topbar-right">
        <input type="range" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)">
        <button id="muteBtn" onclick="toggleMute()">Mute</button>
      </div>
    </div>

    <div class="music-controls">
      <div class="music-info">
        <span class="music-title" id="mcTitle">Super Mario RPG</span>
        <span class="music-artist" id="mcArtist">Yoko Shimomura</span>
      </div>
      <div class="music-btn-row">
        <button class="music-btn" onclick="musicPrev()">&#9664;&#9664;</button>
        <button class="music-btn" id="mcPlayPause" onclick="musicPlayPause()">&#9646;&#9646;</button>
        <button class="music-btn" onclick="musicNext()">&#9654;&#9654;</button>
        <button class="music-btn" id="mcLoop" onclick="musicToggleLoop()">&#8635;</button>
      </div>
      <div class="music-seek-row">
        <span class="music-time" id="mcCurrent">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" oninput="musicSeek(this.value)">
        <span class="music-time" id="mcDuration">0:00</span>
      </div>
    </div>
  </div>

  <main class="page-shell" id="mainContent">
    <h1 class="site-title">GN-Neon</h1>
    <div id="content">Loading...</div>
  </main>

  <canvas id="visualizerCanvas"></canvas>
  <div class="version-tag" id="vTag">v0.40</div>

<script>
let currentIndex = 0, isMuted = false, currentTrack = 0, isLooping = false, seekDragging = false, isVisualizerMode = false;

const playlist = [
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Super%20Mario%20RPG.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Philly%20Nice%20(B-Side).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/dq%20blizzard.mp3'
];
const trackMeta = [
  { title: 'Super Mario RPG', artist: 'Yoko Shimomura' },
  { title: 'Philly Nice (B-Side)', artist: 'Unknown Artist' },
  { title: 'DQ Blizzard', artist: 'Unknown Artist' }
];

function enterSite() {
  const overlay = document.getElementById('splashOverlay');
  if (overlay.classList.contains('ready')) {
    overlay.classList.add('fade-out');
    ensureAudioContext();
    document.getElementById('bgMusic').play().catch(e => console.warn(e));
  }
}

let audioCtx = null, analyser = null, sourceNode = null, audioContextReady = false;
function ensureAudioContext() {
  if (audioContextReady) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  const audio = document.getElementById('bgMusic');
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    audioContextReady = true;
  } catch (e) { console.warn(e); }
}

function initMusic() {
  const audio = document.getElementById('bgMusic');
  audio.src = playlist[currentTrack];
  audio.volume = 0.5;
  audio.addEventListener('ended', () => isLooping ? (audio.currentTime = 0, audio.play()) : musicNext());
  audio.addEventListener('timeupdate', updateSeekBar);
  audio.addEventListener('play', () => { document.getElementById('mcPlayPause').innerHTML = '&#9646;&#9646;'; });
  audio.addEventListener('pause', () => document.getElementById('mcPlayPause').innerHTML = '&#9654;');
  updateTrackDisplay();
}

function updateTrackDisplay() {
  document.getElementById('mcTitle').textContent = trackMeta[currentTrack].title;
  document.getElementById('mcArtist').textContent = trackMeta[currentTrack].artist;
}

function updateSeekBar() {
  if (seekDragging) return;
  const audio = document.getElementById('bgMusic'), bar = document.getElementById('seekBar');
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  bar.value = pct;
  bar.style.background = `linear-gradient(to right, #0044ff ${pct}%, #333 ${pct}%)`;
  document.getElementById('mcCurrent').textContent = fmtTime(audio.currentTime);
  document.getElementById('mcDuration').textContent = fmtTime(audio.duration);
}

function fmtTime(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }
function musicPlayPause() { ensureAudioContext(); const a = document.getElementById('bgMusic'); a.paused ? a.play() : a.pause(); }
function musicNext() { currentTrack = (currentTrack + 1) % playlist.length; const a = document.getElementById('bgMusic'); a.src = playlist[currentTrack]; updateTrackDisplay(); a.play(); }
function musicPrev() { const a = document.getElementById('bgMusic'); if(a.currentTime > 3) a.currentTime = 0; else currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; a.src = playlist[currentTrack]; updateTrackDisplay(); a.play(); }
function musicToggleLoop() { isLooping = !isLooping; document.getElementById('mcLoop').classList.toggle('active-loop', isLooping); }
function musicSeek(v) { const a = document.getElementById('bgMusic'); seekDragging = true; a.currentTime = (v/100)*a.duration; setTimeout(()=>seekDragging=false, 200); }
function setVolume(v) { document.getElementById('bgMusic').volume = v/100; }
function toggleMute() { isMuted = !isMuted; document.getElementById('muteBtn').innerText = isMuted ? 'Unmute' : 'Mute'; document.querySelectorAll('audio').forEach(a => a.muted = isMuted); }

function toggleVisualizerMode() {
  isVisualizerMode = !isVisualizerMode;
  const main = document.getElementById('mainContent'), top = document.getElementById('topbar'), tag = document.getElementById('vTag'), btn = document.getElementById('vizModeBtn');
  if (isVisualizerMode) {
    main.classList.add('ui-hidden'); top.classList.add('ui-hidden'); tag.classList.add('ui-hidden'); btn.innerText = "Exit Mode";
    document.addEventListener('keydown', exitVizOnEsc);
  } else {
    main.classList.remove('ui-hidden'); top.classList.remove('ui-hidden'); tag.classList.remove('ui-hidden'); btn.innerText = "Visualizer";
    top.classList.remove('hover-reveal'); document.removeEventListener('keydown', exitVizOnEsc);
  }
}
function exitVizOnEsc(e) { if(e.key === 'Escape') toggleVisualizerMode(); }

(function() {
  const topbar = document.getElementById('topbar');
  let hideTimer = null, isNear = false;
  const show = () => { topbar.classList.remove('hidden'); if (isVisualizerMode) topbar.classList.add('hover-reveal'); clearTimeout(hideTimer); };
  const hide = () => { if(!isNear) { topbar.classList.add('hidden'); if (isVisualizerMode) topbar.classList.remove('hover-reveal'); } };
  document.addEventListener('mousemove', (e) => {
    if (e.clientY < 100) { isNear = true; show(); } 
    else { isNear = false; if(!topbar.matches(':hover')) { clearTimeout(hideTimer); hideTimer = setTimeout(hide, 1500); } }
  });
  topbar.addEventListener('mouseenter', show);
  topbar.addEventListener('mouseleave', () => { if(!isNear) hideTimer = setTimeout(hide, 1000); });
  hideTimer = setTimeout(hide, 3000);
})();

(function() {
  const canvas = document.getElementById('visualizerCanvas'), ctx = canvas.getContext('2d');
  const resize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  function draw() {
    requestAnimationFrame(draw);
    const W = canvas.width, H = canvas.height;
    ctx.clearRect(0, 0, W, H);
    if (!audioContextReady || !analyser) { drawIdle(ctx, W, H); return; }
    const bufferLength = analyser.frequencyBinCount, dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);
    const barCount = 120, gap = 2, barW = (W - gap * (barCount - 1)) / barCount, maxHeight = H * 0.45;
    for (let i = 0; i < barCount; i++) {
      let intensity = Math.pow(dataArray[i] / 255, 1.5);
      const barH = intensity * maxHeight, x = i * (barW + gap), y = H - barH, opacity = 0.5 + (intensity * 0.5);
      ctx.fillStyle = `rgba(0, 0, 255, ${opacity})`;
      ctx.fillRect(x, y, barW, barH);
    }
  }
  function drawIdle(ctx, W, H) {
    const barCount = 120, gap = 2, barW = (W - gap * (barCount - 1)) / barCount;
    for (let i = 0; i < barCount; i++) { ctx.fillStyle = 'rgba(0, 0, 255, 0.2)'; ctx.fillRect(i * (barW + gap), H - 2, barW, 2); }
  }
  draw();
})();

const pages = {
  home: `
    <section class="home-grid">
      <article class="panel hero-panel">
        <h2>Home</h2>
        <p class="lead">Welcome to GN-Neon (Goober Network). Take a look at these cats.</p>

          <figure class="image-card"><img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/sili3.jpg"><span>sili3.jpg</span></figure>
        </div>
      </article>
      <aside class="panel patch-panel">
        <div class="version-chip">Latest overhaul · v0.40</div>

        <p class="section-copy">Restructure and new tools added!</p>
        <ul class="patch-list">
          <li>Renamed to <strong>GN-Neon</strong>.</li>

          <li>Added <strong>Creations</strong> and <strong>Unblocked</strong> sections.</li>
          <li>Visualizer contrast and blue color refinements.</li>
        </ul>
      </aside>
    </section>
  `,
  tools: `
    <section class="panel">
      <h2>Tools</h2>
      <div class="button-row">
        <button onclick="showTool('calc')">Calculators</button>
        <button onclick="showTool('ide')">HTML IDE</button>
        <button onclick="showTool('chat')">AI Chatbot</button>
        <button onclick="showTool('canvas')">Painting Canvas</button>
        <button onclick="showTool('search')">Search Engine</button>
        <button onclick="showTool('ciphers')">Ciphers</button>
      </div>
      <div id="toolArea"></div>
    </section>
  `,
  games: `
    <section class="panel">
      <h2>Games</h2>
      <div class="button-row">
        <button onclick="showScratchGames()">Scratch Games</button>
        <button onclick="showEmulators()">Emulators</button>
        <button onclick="showTool('flappy')">Flappy Bird</button>
        <button onclick="showTool('guess')">Number Guessing</button>
      </div>
      <div id="gamesContent"></div>
    </section>
  `,
  creations: `
    <section class="panel">
      <h2>Creations</h2>
      <div class="button-row">
        <button onclick="showCreation('code')">Code</button>
        <button onclick="showCreation('videos')">Map Videos</button>
        <button onclick="showCreation('images')">Map Images</button>
      </div>
      <div id="creationArea"></div>
    </section>
  `,
  unblocked: `
    <section class="panel">
      <h2>Unblocked</h2>
      <div class="button-row">
        <button onclick="showEmbed('https://www.crazygames.com')">CrazyGames</button>
        <button onclick="showEmbed('https://www.poki.com')">Poki</button>
        <button onclick="showEmbed('https://www.youtube.com/embed')">YouTube</button>
      </div>
      <div id="embedArea" class="embed-container" style="display:none;"></div>
    </section>
  `,
  about: `
    <section class="panel">
      <h2>About</h2>
      <p class="section-copy">This is GN-Neon. The GN stands for Goober Network. I made this site to bypass lightspeed filter. Why? Because I can.<br><br>I (Neon64) made this site to provide games, tools, and unblocked content for everyone.</p>
    </section>
  `
};

function load(page) { document.getElementById("content").innerHTML = pages[page]; }

function showTool(type) {
  const area = document.getElementById("toolArea") || document.getElementById("gamesContent");
  if (type === 'calc') {
    area.innerHTML = `<h3>Calculators</h3><div class="button-row"><button onclick="showCalc('simple')">Simple</button><button onclick="showCalc('volume')">Volume</button><button onclick="showCalc('graph')">Graph</button></div><div id="calcArea"></div>`;
  } else if (type === 'ide') {
    area.innerHTML = `<h3>HTML IDE</h3><div id="ideContainer"><textarea id="ideInput" placeholder="Write HTML/CSS/JS here..." oninput="runIDE()"></textarea><iframe id="ideOutput"></iframe></div>`;
  } else if (type === 'chat') {
    area.innerHTML = `<h3>AI Chatbot</h3><div id="chatContainer"><div id="chatLog"></div><div class="chat-input-row"><input id="chatInput" placeholder="Ask something..." onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">Send</button></div></div>`;
  } else if (type === 'canvas') {
    area.innerHTML = `<h3>Painting Canvas</h3><canvas id="paintingCanvas" width="800" height="500"></canvas><div class="canvas-controls"><input type="color" id="brushColor" value="#0000ff"><input type="range" id="brushSize" min="1" max="50" value="5"><button onclick="clearCanvas()">Clear</button></div>`;
    initCanvas();
  } else if (type === 'search') {
    area.innerHTML = `<h3>Search Engine</h3><div style="display:flex;gap:0.5rem;"><input id="searchInput" style="flex:1" placeholder="Search Google..."><button onclick="doSearch()">Search</button></div>`;
  } else if (type === 'ciphers') {
    area.innerHTML = `<h3>Ciphers</h3><div class="button-row"><button onclick="showCipher('caesar')">Caesar</button><button onclick="showCipher('atbash')">Atbash</button></div><div id="cipherArea"></div>`;
  } else if (type === 'flappy') {
    area.innerHTML = `<div class="embed-container"><iframe src="https://neal.fun/flappy-bird/"></iframe></div>`;
  } else if (type === 'guess') {
    area.innerHTML = `<h3>Number Guessing</h3><input id="guessInput" type="number"><button onclick="checkGuess()">Guess</button><p id="guessMsg"></p>`;
    window.secretNum = Math.floor(Math.random()*100)+1;
  }
}

function showCalc(type) {
  const c = document.getElementById("calcArea");
  if (type === "simple") c.innerHTML = `<h3>Simple</h3><input id="simpleInput" placeholder="2+2*3" onkeydown="if(event.key==='Enter')calcSimple()"><button onclick="calcSimple()">Calc</button><p id="simpleOut"></p>`;
  else if (type === "volume") c.innerHTML = `<h3>Volume</h3>Cube (Side): <input id="cubeSide" onkeydown="if(event.key==='Enter')volCube()"><button onclick="volCube()">Calc</button><p id="cubeOut"></p>Sphere (Radius): <input id="sphereR" onkeydown="if(event.key==='Enter')volSphere()"><button onclick="volSphere()">Calc</button><p id="sphereOut"></p>Rectangular Prism: <input id="recL" placeholder="L"><input id="recW" placeholder="W"><input id="recH" placeholder="H"><button onclick="volRect()">Calc</button><p id="rectOut"></p>`;
  else if (type === "graph") c.innerHTML = `<h3>Graph</h3><div class="canvas-wrap"><canvas id="grid" width="400" height="400"></canvas></div><br>y=<input id="eq1" onkeydown="if(event.key==='Enter')drawGraph()"><button onclick="drawGraph()">Graph</button>`;
}

function showCipher(type) {
  const area = document.getElementById("cipherArea");
  area.innerHTML = `<h3>${type.toUpperCase()}</h3><textarea id="cipherIn" style="width:100%;height:100px" placeholder="Text to encode/decode..."></textarea><br><button onclick="runCipher('${type}')">Run</button><p id="cipherOut" style="background:#000;padding:1rem;border-radius:8px;white-space:pre-wrap;"></p>`;
}

function runCipher(type) {
  const input = document.getElementById('cipherIn').value;
  let out = "";
  if (type === 'caesar') {
    out = input.replace(/[a-z]/gi, c => String.fromCharCode((c <= "Z" ? 90 : 122) >= (c = c.charCodeAt(0) + 3) ? c : c - 26));
  } else if (type === 'atbash') {
    out = input.replace(/[a-z]/gi, c => String.fromCharCode((c <= "Z" ? 155 : 219) - c.charCodeAt(0)));
  }
  document.getElementById('cipherOut').innerText = out;
}

function runIDE() { const out = document.getElementById('ideOutput').contentWindow.document; out.open(); out.write(document.getElementById('ideInput').value); out.close(); }
function sendChat() { const log = document.getElementById('chatLog'), inp = document.getElementById('chatInput'); if(!inp.value)return; log.innerHTML += `<div class="chat-msg user-msg">${inp.value}</div>`; setTimeout(()=>log.innerHTML+=`<div class="chat-msg bot-msg">Real AI integration coming soon!</div>`, 500); inp.value=''; log.scrollTop=log.scrollHeight; }
function doSearch() { window.open('https://www.google.com/search?q=' + encodeURIComponent(document.getElementById('searchInput').value), '_blank'); }

function initCanvas() {
  const cvs = document.getElementById('paintingCanvas'), ctx = cvs.getContext('2d');
  let painting = false;
  cvs.onmousedown = () => painting = true;
  cvs.onmouseup = () => { painting = false; ctx.beginPath(); };
  cvs.onmousemove = (e) => {
    if(!painting) return;
    ctx.lineWidth = document.getElementById('brushSize').value;
    ctx.lineCap = 'round'; ctx.strokeStyle = document.getElementById('brushColor').value;
    const rect = cvs.getBoundingClientRect();
    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
    ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
  };
}
function clearCanvas() { paintingCanvas.getContext('2d').clearRect(0,0,800,500); }

function showEmbed(url) { const area = document.getElementById('embedArea'); area.style.display = 'block'; area.innerHTML = `<iframe src="${url}"></iframe>`; }
function showCreation(type) { document.getElementById('creationArea').innerHTML = `<h3>${type.toUpperCase()}</h3><p>Content for ${type} goes here.</p>`; }

// Restore Original Calc Logic
function calcSimple() { try { simpleOut.innerText = eval(simpleInput.value); } catch { simpleOut.innerText = "Error"; } }
function volCube() { const v = parseFloat(cubeSide.value); cubeOut.innerText = !isNaN(v) ? v ** 3 : "Invalid"; }
function volSphere() { const v = parseFloat(sphereR.value); sphereOut.innerText = !isNaN(v) ? (4/3)*Math.PI*v**3 : "Invalid"; }
function volRect() { const l=parseFloat(recL.value), w=parseFloat(recW.value), h=parseFloat(recH.value); rectOut.innerText = !isNaN(l)&&!isNaN(w)&&!isNaN(h) ? l*w*h : "Invalid"; }
function drawGraph() {
  const ctx = grid.getContext("2d"); ctx.fillStyle = "black"; ctx.fillRect(0,0,400,400);
  ctx.strokeStyle = "white"; ctx.beginPath(); ctx.moveTo(200,0); ctx.lineTo(200,400); ctx.moveTo(0,200); ctx.lineTo(400,200); ctx.stroke();
  let expr = eq1.value.replace(/(\d)x/g, "$1*x");
  ctx.strokeStyle = "cyan"; ctx.beginPath();
  for(let px=0; px<=400; px++){
    let x = (px-200)/20; let y; try { y = eval(expr); } catch { continue; }
    let py = 200 - (y*20); if(px===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.stroke();
}
function checkGuess() { const v = parseInt(guessInput.value); guessMsg.innerText = v === window.secretNum ? "Correct!" : v < window.secretNum ? "Too low" : "Too high"; }

function navigateTo(e) { document.getElementById('gamesContent').innerHTML = `<h3>${e.toUpperCase()} Emulator</h3><p>Loading...</p>`; }
