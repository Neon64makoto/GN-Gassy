<!DOCTYPE html>
<html>
<head>
  <title>GN-Gassy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="
  background:black;
  color:white;
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  font-family:Arial;
">

<h1 style="margin:10px;">GN-Gassy</h1>

<div style="margin:10px;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>

<div id="content" style="
  flex:1;
  display:flex;
  flex-direction:column;
  padding:10px;
  gap:10px;
">Loading...</div>

<script>
// -------- PAGES --------
const pages = {

home: `
  <h2>Home</h2>
  <p>Welcome to GN-Gassy.</p>
  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" style="width:30%;border:1px solid white;">
  <br><br>
  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" style="width:30%;border:1px solid white;">
`,

calc: `
  <h2>Calculators</h2>
  <button onclick="showCalc('simple')">Simple</button>
  <button onclick="showCalc('volume')">Volumes</button>
  <button onclick="showCalc('graph')">Graph</button>
  <div id="calcContent" style="margin-top:10px;"></div>
`,

games: `
  <h2>Games</h2>
  <div style="display:flex;flex:1;gap:10px;height:80vh;">

    <div style="width:20%;border:1px solid white;padding:5px;">
      <h3>Controls</h3>
      <p>Under Construction</p>
    </div>

    <div style="width:60%;text-align:center;border:1px solid white;padding:5px;">
      <button onclick="prevGame()">◀</button>
      <button onclick="fullscreenGame()">Fullscreen</button>

      <div id="gameContainer" style="width:100%;height:60vh;margin-top:10px;border:1px solid white;">
        <iframe id="scratchFrame" allow="fullscreen" style="width:100%;height:100%;"></iframe>
      </div>

      <button onclick="nextGame()">▶</button>
      <h3 id="gameTitle"></h3>
    </div>

    <div style="width:20%;border:1px solid white;padding:5px;">
      <h3>Credits</h3>
      <p>Under Construction</p>
    </div>

  </div>
`,

about: `<h2>About</h2><p>GN-Gassy tools site.</p>`
};

// -------- LOAD --------
function load(page){
  document.getElementById("content").innerHTML = pages[page];
}

// -------- CALCS --------
function showCalc(type){
  const c = document.getElementById("calcContent");

  if(type==="simple"){
    c.innerHTML = `
      <input id="simpleInput">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  }

  if(type==="graph"){
    c.innerHTML = `
      <div style="display:flex;gap:10px;height:70vh;">

        <!-- LEFT SIDE -->
        <div style="width:30%;border:1px solid white;padding:5px;">
          X <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
          Y <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>

          y=<input id="eq1"><span id="out1"></span><br>
          y=<input id="eq2"><span id="out2"></span><br>
          y=<input id="eq3"><span id="out3"></span><br>
          y=<input id="eq4"><span id="out4"></span><br><br>

          <button onclick="drawGraph()">Graph</button>
        </div>

        <!-- RIGHT SIDE -->
        <div style="flex:1;border:1px solid white;">
          <canvas id="grid" style="width:100%;height:100%;"></canvas>
        </div>

      </div>
    `;
  }
}

// -------- SIMPLE --------
function calcSimple(){
  try{
    let f = Function("return " + simpleInput.value);
    simpleOut.innerText = f();
  }catch{
    simpleOut.innerText = "Error";
  }
}

// -------- PARSER --------
function parseEq(eq){
  eq = eq.replace(/\s+/g,"");
  eq = eq.replace(/\^/g,"**");
  eq = eq.replace(/(\d)(x)/g,"$1*$2");
  eq = eq.replace(/x(\d)/g,"x*$1");
  eq = eq.replace(/(\d)\(/g,"$1*(");
  eq = eq.replace(/x\(/g,"x*(");
  eq = eq.replace(/sin/g,"Math.sin");
  eq = eq.replace(/cos/g,"Math.cos");
  eq = eq.replace(/tan/g,"Math.tan");
  return eq;
}

// -------- GRAPH --------
function drawGraph(){
  const canvas = document.getElementById("grid");
  const ctx = canvas.getContext("2d");

  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  const w = canvas.width;
  const h = canvas.height;

  let xminVal=+xmin.value, xmaxVal=+xmax.value;
  let yminVal=+ymin.value, ymaxVal=+ymax.value;

  function X(x){ return (x-xminVal)/(xmaxVal-xminVal)*w; }
  function Y(y){ return h-(y-yminVal)/(ymaxVal-yminVal)*h; }

  // background
  ctx.fillStyle="black";
  ctx.fillRect(0,0,w,h);

  // grid (stylish)
  ctx.strokeStyle="#222";
  for(let i=0;i<=20;i++){
    let x=xminVal+(xmaxVal-xminVal)/20*i;
    let y=yminVal+(ymaxVal-yminVal)/20*i;

    ctx.beginPath();
    ctx.moveTo(X(x),0); ctx.lineTo(X(x),h);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(0,Y(y)); ctx.lineTo(w,Y(y));
    ctx.stroke();
  }

  // axes
  ctx.strokeStyle="#aaa";
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.moveTo(X(0),0); ctx.lineTo(X(0),h);
  ctx.moveTo(0,Y(0)); ctx.lineTo(w,Y(0));
  ctx.stroke();

  ctx.lineWidth=1;

  const equations = [eq1,eq2,eq3,eq4];
  const outputs = [out1,out2,out3,out4];
  const colors = ["red","cyan","lime","yellow"];

  equations.forEach((el,i)=>{
    let eq = el.value;
    if(!eq) return;

    let parsed = parseEq(eq);

    let func;
    try{
      func = Function("x","return "+parsed);
      outputs[i].innerText = " f(1)=" + func(1).toFixed(2);
    }catch{
      outputs[i].innerText = " error";
      return;
    }

    ctx.strokeStyle = colors[i];
    ctx.beginPath();

    let step = (xmaxVal - xminVal) / w;

    let first = true;

    for(let x=xminVal; x<=xmaxVal; x+=step){
      let y;
      try{ y = func(x); }
      catch{ continue; }

      if(!isFinite(y)) continue;

      let px = X(x);
      let py = Y(y);

      if(first){
        ctx.moveTo(px,py);
        first=false;
      } else {
        ctx.lineTo(px,py);
      }
    }

    ctx.stroke();
  });
}

// -------- GAMES --------
const games = [
  "https://turbowarp.org/1143765424/embed"
];
const titles = [
  "Sisyphean Escalator"
];

let currentIndex = 0;

function updateGame(){
  const f=document.getElementById("scratchFrame");
  if(!f) return;
  f.src=games[currentIndex];
  gameTitle.innerText=titles[currentIndex];
}

function nextGame(){ currentIndex=(currentIndex+1)%games.length; updateGame(); }
function prevGame(){ currentIndex=(currentIndex-1+games.length)%games.length; updateGame(); }

function fullscreenGame(){
  const elem=document.getElementById("gameContainer");
  if(elem.requestFullscreen) elem.requestFullscreen();
}

// init
load("home");
</script>

</body>
</html>
