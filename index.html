<!DOCTYPE html>
<html>
<head>
  <title>GN-Gassy</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="background:black; color:white; margin:0;">

<h1 style="margin-left:10px;">GN-Gassy</h1>

<hr>

<div style="margin-left:10px;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>

<hr>

<div id="content" style="width:100%; height:90vh;">Loading...</div>

<script>
// -------- PAGES --------
const pages = {

home: `
  <h2>Home</h2>
  <p>Welcome to GN-Gassy.</p>

  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="30%">
  <br><br>
  <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="30%">
`,

calc: `
  <h2>Calculators</h2>
  <button onclick="showCalc('simple')">Simple</button>
  <button onclick="showCalc('volume')">Volumes</button>
  <button onclick="showCalc('graph')">Graph</button>
  <div id="calcContent"></div>
`,

games: `
  <h2>Scratch Games</h2>

  <table border="1" width="100%" height="80%">
    <tr>

      <td width="20%" valign="top">
        <h3>Controls</h3>
        <p id="controlsText">Under Construction</p>
      </td>

      <td width="60%" align="center">

        <button onclick="prevGame()">◀</button>
        <button onclick="fullscreenGame()">Fullscreen</button>

        <br><br>

        <div id="gameContainer" style="width:100%; height:60vh;">
          <iframe id="scratchFrame"
            src="https://turbowarp.org/1143765424/embed?addons=pause&fps=60"
            style="width:100%; height:100%;">
          </iframe>
        </div>

        <br><br>

        <button onclick="nextGame()">▶</button>

      </td>

      <td width="20%" valign="top">
        <h3>Credits</h3>
        <p id="creditsText">Under Construction</p>
      </td>

    </tr>
  </table>

  <h3 id="gameTitle">Sisyphean Escalator</h3>
`,

about: `<h2>About</h2><p>GN-Gassy tools site.</p>`
};

// -------- LOAD --------
function load(page){
  document.getElementById("content").innerHTML = pages[page];
}

// -------- CALCS --------
function showCalc(type){
  const c = document.getElementById("calcContent");

  if(type==="simple"){
    c.innerHTML = `
      <input id="simpleInput">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  }

  if(type==="volume"){
    c.innerHTML = `
      Cube <input id="cube"><button onclick="volCube()">Calc</button><p id="o1"></p>
      Sphere <input id="sphere"><button onclick="volSphere()">Calc</button><p id="o2"></p>
      L<input id="l"> W<input id="w"> H<input id="h"><button onclick="volRect()">Calc</button><p id="o3"></p>
      R<input id="cr"> H<input id="ch"><button onclick="volCyl()">Calc</button><p id="o4"></p>
      Base<input id="pb"> H<input id="ph"><button onclick="volPyr()">Calc</button><p id="o5"></p>
    `;
  }

  if(type==="graph"){
    c.innerHTML = `
      X <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>
      Y <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>

      y=<input id="eq1"><br>
      y=<input id="eq2"><br>
      y=<input id="eq3"><br>
      y=<input id="eq4"><br><br>

      <button onclick="drawGraph()">Graph</button><br><br>

      <canvas id="grid" style="width:90%; height:50vh;"></canvas>
    `;
  }
}

// -------- SIMPLE --------
function calcSimple(){
  try{ simpleOut.innerText = eval(simpleInput.value); }
  catch{ simpleOut.innerText = "Error"; }
}

// -------- VOLUME --------
function volCube(){ o1.innerText=cube.value**3; }
function volSphere(){ o2.innerText=(4/3)*Math.PI*sphere.value**3; }
function volRect(){ o3.innerText=l.value*w.value*h.value; }
function volCyl(){ o4.innerText=Math.PI*cr.value**2*ch.value; }
function volPyr(){ o5.innerText=(pb.value*ph.value)/3; }

// -------- PARSER --------
function parseEq(eq){
  eq = eq.replace(/\s+/g,"");
  eq = eq.replace(/\^/g,"**");
  eq = eq.replace(/(\d)(x)/g,"$1*$2");
  eq = eq.replace(/(x)(\d)/g,"$1*$2");
  eq = eq.replace(/(\d)\(/g,"$1*(");
  eq = eq.replace(/x\(/g,"x*(");
  eq = eq.replace(/sin/g,"Math.sin");
  eq = eq.replace(/cos/g,"Math.cos");
  eq = eq.replace(/tan/g,"Math.tan");
  eq = eq.replace(/sqrt/g,"Math.sqrt");
  return eq;
}

// -------- GRAPH (RESPONSIVE) --------
function drawGraph(){
  const canvas = document.getElementById("grid");
  const ctx = canvas.getContext("2d");

  // make canvas match display size
  canvas.width = canvas.clientWidth;
  canvas.height = canvas.clientHeight;

  const w = canvas.width;
  const h = canvas.height;

  let xmin=+xmin.value, xmax=+xmax.value;
  let ymin=+ymin.value, ymax=+ymax.value;

  function X(x){ return (x-xmin)/(xmax-xmin)*w; }
  function Y(y){ return h-(y-ymin)/(ymax-ymin)*h; }

  ctx.fillStyle="black";
  ctx.fillRect(0,0,w,h);

  ctx.beginPath();
  for(let i=0;i<=10;i++){
    let x=xmin+(xmax-xmin)/10*i;
    let y=ymin+(ymax-ymin)/10*i;
    ctx.moveTo(X(x),0); ctx.lineTo(X(x),h);
    ctx.moveTo(0,Y(y)); ctx.lineTo(w,Y(y));
  }
  ctx.strokeStyle="#333";
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(X(0),0); ctx.lineTo(X(0),h);
  ctx.moveTo(0,Y(0)); ctx.lineTo(w,Y(0));
  ctx.strokeStyle="white";
  ctx.stroke();

  [eq1.value,eq2.value,eq3.value,eq4.value].forEach((eq,i)=>{
    if(!eq) return;
    let p=parseEq(eq);
    ctx.beginPath();
    let first=true;
    for(let x=xmin;x<=xmax;x+=(xmax-xmin)/200){
      let y;
      try{ y=eval(p.replaceAll("x","("+x+")")); }catch{ continue; }
      let px=X(x), py=Y(y);
      if(first){ ctx.moveTo(px,py); first=false; }
      else ctx.lineTo(px,py);
    }
    ctx.strokeStyle=["red","cyan","lime","yellow"][i%4];
    ctx.stroke();
  });
}

// -------- GAMES --------
const games = [/* same list */];
const titles = [/* same list */];

let currentIndex = 0;

function updateGame(){
  const f=document.getElementById("scratchFrame");
  if(!f) return;
  f.src=games[currentIndex];
  gameTitle.innerText=titles[currentIndex];
}

function nextGame(){ currentIndex=(currentIndex+1)%games.length; updateGame(); }
function prevGame(){ currentIndex=(currentIndex-1+games.length)%games.length; updateGame(); }

function fullscreenGame(){
  const elem=document.getElementById("gameContainer");
  if(elem.requestFullscreen) elem.requestFullscreen();
}

// init
load("home");
</script>

</body>
</html>
