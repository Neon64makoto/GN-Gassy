<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN-Neon</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --panel-alt: #151515;
      --border: #333;
      --border-strong: #444;
      --text: #fff;
      --muted: #b3b3b3;
      --main-color: #0000ff;
      --panel-color: rgba(0, 50, 255, 0.25);
      --music-text: #0000ff;
      --menu-text: #0000ff;
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.32);
      --panel-size: 140px;
      --bg-gradient-top: #000000;
      --bg-gradient-bottom: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-size: 16px;
    }

    body {
      background: linear-gradient(to bottom, var(--bg-gradient-top, #000), var(--bg-gradient-bottom, #000)) no-repeat fixed;
      background-size: cover;
      color: var(--text);
      font-family: Arial, sans-serif;
      transition: opacity 0.5s ease;
      min-height: 100vh;
    }

    /* Splash / Loading Overlay */
    #splashOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(45deg, #0a0a0a 25%, #1a1a2e 25%, #1a1a2e 50%, #0a0a0a 50%, #0a0a0a 75%, #1a1a2e 75%, #1a1a2e);
      background-size: 40px 40px;
      animation: loading-stripes 0.8s linear infinite;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #splashOverlay.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    #splashText {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px var(--main-color);
      letter-spacing: 4px;
      text-align: center;
      pointer-events: none;
    }

    #splashSubtext {
      margin-top: 1rem;
      color: var(--music-text);
      font-size: 1rem;
      pointer-events: none;
    }

    @keyframes loading-stripes {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: 40px 40px;
      }
    }

    /* Styled scrollbars */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--main-color);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--main-color);
    }

    /* Firefox scrollbar styling */
    * {
      scrollbar-color: var(--main-color) #0a0a0a;
      scrollbar-width: thin;
    }

    body.video-bg {
      position: relative;
    }

    #videoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: blur(0px);
    }

    .content-overlay {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
    }

    button,
    input, textarea {
      font: inherit;
    }

    button {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 1.25rem 2rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: var(--main-color);
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    button:hover {
      background: var(--main-color);
      box-shadow: 0 0 15px var(--main-color);
      transform: translateY(-2px);
    }
    
    button.under-construction {
      background: #333;
      border-color: #555;
      color: #888;
      cursor: not-allowed;
      position: relative;
    }
    
    button.under-construction:hover {
      background: #444;
      border-color: #666;
      color: #aaa;
      box-shadow: none;
      transform: none;
    }
    
    button.under-construction:hover span {
      display: none;
    }
    
    button.under-construction:hover::after {
      content: "Under Construction";
    }

    input, textarea {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 0.75rem;
      color: var(--text);
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }

    input::placeholder {
      color: #8b8b8b;
    }

    /* ═══════════════════════════════════════════════════════════
       UNIFIED DIAGONAL PANEL LAYOUT (Opera GX style)
       ═══════════════════════════════════════════════════════════ */

    /* ─── LOGO CONNECTOR (corner piece) ─────────────────────── */
    .logo-connector {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: var(--panel-size);
      z-index: 620; /* Higher than topbar and left-panel */
      background: rgba(17, 17, 17, 0.97);
      border: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--main-color), inset 0 0 15px var(--panel-color);
      transform: translate(-100%, -100%);
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 0;
      font-size: 3rem; 
    }

    .logo-connector.visible {
      transform: translate(0, 0);
      opacity: 1;
    }

    .logo-connector span {
      font-size: 0.55rem;
      font-weight: bold;
      color: var(--main-color);
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px var(--main-color);
      text-align: center;
      line-height: 1.1;
      user-select: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

        /* ─── LEFT PANEL (NAV) ──────────────────────────────────────── */
    .left-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: 100vh;
      z-index: 610;
      background: rgba(17, 17, 17, 0.97);
      border-right: 2px solid var(--main-color);
      border-top: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      padding-top: var(--panel-size);
      display: flex;
      flex-direction: column;
      gap: 0;
      transform: translateX(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 1;
      pointer-events: auto;
    }

    .left-panel.visible {
      transform: translateX(0);
    }

    .left-panel.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .left-panel.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .left-panel .nav {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.5rem;
      width: 100%;
    }

    .left-panel .nav button {
      width: 100%;
      text-align: left;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      margin: 0;
      background: transparent;
      border: 1px solid var(--panel-color);
      border-radius: 6px;
      color: var(--menu-text);
      transition: all 0.15s;
    }

    .left-panel .nav button:hover {
      background: var(--panel-color);
      border-color: var(--main-color);
      color: #fff;
      transform: translateX(3px);
      box-shadow: 0 0 12px var(--main-color);
    }

      /* ─── TOP PANEL (MUSIC) ──────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--panel-size);
      z-index: 610;
      background: rgba(17, 17, 17, 0.97);
      border-bottom: 2px solid var(--main-color);
      border-left: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      padding: 0.75rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding-left: var(--panel-size);
      transform: translateY(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 1;
      pointer-events: auto;
    }

    .topbar.visible {
      transform: translateY(0);
    }

    .topbar.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .topbar.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .topbar-row1 {
      width: 100%;
      display: none;
    }

    .nav {
      text-align: center;
    }

    .topbar-brand {
      display: none;
    }

    .topbar-right {
      position: absolute;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* ─── DIGITAL CLOCK (7-Segment Style) ─────────────────────────────── */
    #digitalClock {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 630;
      font-family: 'Courier New', Courier, monospace;
      font-size: 3rem;
      font-weight: bold;
      color: var(--main-color);
      text-shadow: 0 0 15px var(--main-color);
      padding: 0.6rem 1.2rem;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid var(--main-color);
      border-radius: 8px;
      text-align: center;
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px var(--panel-color);
      transform: translateY(0);
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      pointer-events: none;
      user-select: none;
    }

    #digitalClock.topbar-active {
      transform: translateY(var(--panel-size));
    }

    #digitalClock.ui-hidden {
      opacity: 0;
    }

    #digitalClock.ui-hidden.viz-persistent {
      opacity: 1;
    }

    .clock-time {
      letter-spacing: 2px;
    }

    .clock-ampm {
      font-size: 1rem;
      margin-left: 0.4rem;
      opacity: 0.8;
    }

    /* ─── HOVER TRIGGER ZONES ─────────────────────────────────────────────── */
    .trigger-zone-left {
      position: fixed;
      top: 0;
      left: 0;
      width: 50px;
      height: 100vh;
      z-index: 500;
    }

    .trigger-zone-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      z-index: 500;
    }

    #muteBtn {
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      min-width: 60px;
    }

    /* ─── STYLIZED VOLUME SLIDER ─────────────────────────────────────── */
    #volumeSlider {
      -webkit-appearance: none;
      width: 250px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      outline: none;
      border: 1px solid #333;
      cursor: pointer;
      margin-left: 0.5rem;
    }
    #volumeInput {
      width: 60px;
      padding: 0.2rem 0.4rem;
      margin: 0;
      font-size: 0.9rem;
      text-align: center;
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      color: var(--text);
    }

    #volumeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--main-color);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--main-color);
      border: 1px solid #fff;
    }

    #volumeSlider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: var(--main-color);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--main-color);
      border: 1px solid #fff;
    }

    /* ─── MUSIC CONTROLS ──────────────────────────────────────────────── */
    .music-controls {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      border-top: 1px solid var(--panel-color);
      padding-top: 0.3rem;
    }

    .track-info {
      width: 100%;
      text-align: center;
      margin-bottom: 0.1rem;
    }

    .track-title {
      display: block;
      font-weight: bold;
      color: var(--music-text);
      font-size: 1rem;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      text-shadow: 0 0 10px var(--main-color);
    }

    .track-artist {
      display: block;
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .playback-bar {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .time-label {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 40px;
      font-family: monospace;
    }

    .progress-container {
      flex: 1;
      height: 6px;
      background: #222;
      border-radius: 3px;
      position: relative;
      cursor: pointer;
      border: 1px solid #333;
    }

    .progress-fill {
      position: absolute;
      top: 0; left: 0; height: 100%;
      background: var(--main-color);
      border-radius: 3px;
      width: 0%;
      box-shadow: 0 0 10px var(--main-color);
    }

    .control-buttons {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.1rem;
    }

    .music-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 0.3rem;
      margin: 0;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .music-btn:hover {
      color: var(--main-color);
      transform: scale(1.15);
      background: transparent;
      box-shadow: none;
    }

    .music-btn.active {
      color: var(--main-color);
      text-shadow: 0 0 10px var(--main-color);
    }

    .play-pause-btn {
      font-size: 1.8rem;
      color: var(--main-color);
    }

    /* ─── HERO & PANELS ─────────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
      padding-left: calc(var(--panel-size) + 2rem);
      padding-top: calc(var(--panel-size) + 2rem);
      transition: padding 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    
    .container.viz-mode {
      padding: 0;
      max-width: none;
    }

    .panel {
      background: rgba(17, 17, 17, 0.85);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 2rem;
      margin-bottom: 2rem;
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 4px; height: 100%;
      background: var(--main-color);
      box-shadow: 0 0 15px var(--main-color);
    }

    h2 {
      margin-top: 0;
      color: var(--main-color);
      text-transform: uppercase;
      letter-spacing: 2px;
      font-size: 1.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .home-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }

    .hero-panel {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .image-row {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .image-card {
      flex: 1;
      min-width: 280px;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      margin: 0;
    }

    .image-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      opacity: 0.9;
      transition: opacity 0.3s;
    }

    .image-card:hover img {
      opacity: 1;
    }

    .image-card span {
      padding: 0.75rem;
      font-size: 0.9rem;
      color: var(--muted);
      background: var(--panel-alt);
      border-top: 1px solid var(--border);
    }

    .lead {
      font-size: 1.2rem;
      line-height: 1.6;
      color: var(--muted);
    }

    /* ─── VISUALIZER MODE ────────────────────────────────────────────── */
    #visualizerContainer {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 10;
      display: none;
      background: transparent;
    }

    #visualizerCanvas {
      width: 100%;
      height: 100%;
    }

    /* ─── UI TOGGLE BUTTON ────────────────────────────────────────────── */
    #uiToggle {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.7);
      border: 1px solid var(--main-color);
      color: var(--main-color);
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.2s;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
      padding: 0;
      margin: 0;
    }

    #uiToggle:hover {
      background: var(--main-color);
      color: #fff;
      box-shadow: 0 0 20px var(--main-color);
    }

    /* ─── ANIMATIONS ──────────────────────────────────────────────────── */
    @keyframes pulse {
      0% { box-shadow: 0 0 5px var(--main-color); }
      50% { box-shadow: 0 0 20px var(--main-color); }
      100% { box-shadow: 0 0 5px var(--main-color); }
    }

    /* ─── CANVAS TOOL ───────────────────────────────────────────────── */
    .canvas-container {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    #paintingCanvas {
      background: #fff;
      border: 2px solid var(--main-color);
      cursor: crosshair;
      width: 100%;
      max-width: 800px;
      height: 500px;
    }
    .canvas-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    /* ─── EMBED AREA ────────────────────────────────────────────────── */
    #embedArea {
      width: 100%;
      height: 600px;
      border: 2px solid var(--main-color);
      margin-top: 1rem;
      display: none;
    }
    #embedArea iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ─── CIPHER TOOL ───────────────────────────────────────────────── */
    .cipher-box {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .cipher-box textarea {
      width: 100%;
      height: 100px;
      resize: vertical;
    }

    /* ─── CHAT BOT ──────────────────────────────────────────────────── */
    .chat-container {
      height: 300px;
      display: flex;
      flex-direction: column;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    #chatLog {
      flex: 1;
      padding: 1rem;
      overflow-y: auto;
      background: #050505;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .chat-msg {
      padding: 0.5rem 0.75rem;
      border-radius: 4px;
      max-width: 80%;
      font-size: 0.9rem;
    }
    .user-msg { background: var(--main-color); align-self: flex-end; }
    .bot-msg { background: #333; align-self: flex-start; }
    .chat-input-area {
      display: flex;
      border-top: 1px solid var(--border);
    }
    .chat-input-area input {
      flex: 1;
      margin: 0;
      border: none;
      border-radius: 0;
    }
    .chat-input-area button {
      margin: 0;
      border-radius: 0;
      padding: 0 1rem;
    }

    /* ─── NUMBER GUESS ──────────────────────────────────────────────── */
    .game-box {
      text-align: center;
      padding: 1rem;
      background: #0c0c0c;
      border-radius: 4px;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .left-panel {
        width: 80px;
      }
      .topbar {
        padding-left: 80px;
        height: 120px;
      }
      .logo-connector {
        width: 80px;
        height: 80px;
      }
      .container {
        padding-left: 100px;
        padding-top: 140px;
      }
      #digitalClock {
        font-size: 1.5rem;
        padding: 0.3rem 0.6rem;
      }
      #volumeSlider {
        width: 100px;
      }
    }
  </style>
</head>
<body>
  <div id="visualizerContainer">
    <canvas id="visualizerCanvas"></canvas>
  </div>

  <audio id="bgMusic" style="display:none;" crossorigin="anonymous"></audio>

  <!-- Click to Enter Splash -->
  <div id="splashOverlay" onclick="enterSite()">
    <div id="splashText">LOADING...</div>
    <div id="splashSubtext">Please wait for the assets to load</div>
  </div>

  <!-- Hover trigger zones -->
  <div class="trigger-zone-left"></div>
  <div class="trigger-zone-top"></div>

  <!-- Logo connector piece (diagonal) -->
  <div class="logo-connector" id="logoConnector">
    <span style="font-size: 32px;">GN<br>NEON</span>
  </div>

  <!-- Left panel (nav) -->
  <div class="left-panel" id="leftPanel">
    <nav class="nav" aria-label="Primary">
      <button onclick="load('home')">Home</button>
      <button onclick="load('creations')">Creations</button>
      <button onclick="load('tools')">Tools</button>
      <button onclick="load('settings')">Settings</button>
      <button onclick="toggleVisualizerMode()">Visualizer</button>
    </nav>
  </div>

  <!-- Top bar (music) -->
  <div class="topbar" id="topBar">
    <div class="music-controls">
      <div class="track-info">
        <span class="track-title" id="mcTitle">Track Title</span>
        <span class="track-artist" id="mcArtist">Artist Name</span>
      </div>
      
      <div class="playback-bar">
        <span class="time-label" id="mcCurrent">0:00</span>
        <input type="range" id="seekBar" min="0" max="100" value="0" style="flex:1; cursor:pointer;">

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
let audioCtx = null, analyser = null, sourceNode = null, audioContextReady = false;

function ensureAudioContext() {
  if (audioContextReady) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  const audio = document.getElementById('bgMusic');
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    audioContextReady = true;
  } catch (e) { console.warn(e); }
}

function initMusic() {
  const audio = document.getElementById('bgMusic');
  
  // Load saved music state
  const savedTrack = localStorage.getItem('gn_neon_track');
  const savedTime = localStorage.getItem('gn_neon_time');
  const savedVolume = localStorage.getItem('gn_neon_volume');
  const savedMute = localStorage.getItem('gn_neon_mute');

  if (savedTrack !== null) currentTrack = parseInt(savedTrack);
  audio.src = playlist[currentTrack];
  
  if (savedVolume !== null) {
    audio.volume = parseFloat(savedVolume);
    document.getElementById('volumeSlider').value = audio.volume * 100;
    document.getElementById('volumeInput').value = Math.round(audio.volume * 100);
  } else {
    audio.volume = 0.5;
  }

  if (savedMute === 'true') {
    isMuted = true;
    audio.muted = true;
    document.getElementById('muteBtn').innerText = 'Unmute';
  }

  if (savedTime !== null) {
    audio.addEventListener('loadedmetadata', () => {
      audio.currentTime = parseFloat(savedTime);
    }, { once: true });
  }

  audio.addEventListener('ended', () => isLooping ? (audio.currentTime = 0, audio.play()) : musicNext());
  audio.addEventListener('timeupdate', () => {
    if (!seekDragging) {
      const seekBar = document.getElementById('seekBar');
      seekBar.value = (audio.currentTime / audio.duration) * 100;
      seekBar.style.background = `linear-gradient(to right, var(--main-color) ${seekBar.value}%, #333 ${seekBar.value}%)`;
      document.getElementById('mcCurrent').innerText = fmtTime(audio.currentTime);
      localStorage.setItem('gn_neon_time', audio.currentTime);
    }
  });
  audio.addEventListener('durationchange', () => {
    document.getElementById('mcDuration').innerText = fmtTime(audio.duration);
  });

  const seekBar = document.getElementById('seekBar');
  seekBar.oninput = () => { seekDragging = true; };
  seekBar.onchange = () => {
    audio.currentTime = (seekBar.value / 100) * audio.duration;
    seekDragging = false;
  };

  const volSlider = document.getElementById('volumeSlider');
  const volInput = document.getElementById('volumeInput');
  volSlider.oninput = () => {
    audio.volume = volSlider.value / 100;
    volInput.value = volSlider.value;
    localStorage.setItem('gn_neon_volume', audio.volume);
  };
  volInput.onchange = () => {
    let v = parseInt(volInput.value);
    if (isNaN(v)) v = 50;
    v = Math.max(0, Math.min(100, v));
    volSlider.value = v;
    audio.volume = v / 100;
    localStorage.setItem('gn_neon_volume', audio.volume);
  };

  updateTrackDisplay();

// ─── VISUALIZER ENGINE ───────────────────────────────────────────────────────
(function() {
  const cvs = document.getElementById('visualizerCanvas');
  const ctx = cvs.getContext('2d');
  
  function resize() {
    cvs.width = window.innerWidth;
    cvs.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function getRGBFromVariable(varName) {
    const color = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    if (color.startsWith('rgba')) {
      const match = color.match(/rgba?\((\d+),\s*(\d+),\s*(\d+)/);
      return match ? [match[1], match[2], match[3]] : [0, 0, 255];
    }
    const temp = document.createElement('div');
    temp.style.color = color;
    document.body.appendChild(temp);
    const rgb = getComputedStyle(temp).color.match(/\d+/g);
    document.body.removeChild(temp);
    return rgb ? rgb.map(Number) : [0, 0, 255];
  }

  function draw() {
    requestAnimationFrame(draw);
    if (!isVisualizerMode) return;
    
    const W = cvs.width, H = cvs.height;
    ctx.clearRect(0, 0, W, H);

    if (!audioContextReady) {
      drawIdle(ctx, W, H);
      return;
    }

    const bufferLength = analyser.frequencyBinCount;
    const dataArray = new Uint8Array(bufferLength);
    analyser.getByteFrequencyData(dataArray);

    const barCount = 80;
    const gap = 4;
    const barW = (W / barCount) - gap;
    
    const isRainbow = rainbowStates['--main-color'].active;
    const [r, g, b] = getRGBFromVariable('--main-color');

    for (let i = 0; i < barCount; i++) {
      const val = dataArray[i];
      const h = (val / 255) * (H * 0.6);
      
      let color;
      if (isRainbow) {
        const hue = (Date.now() / 50 + i * 2) % 360;
        color = `hsl(${hue}, 100%, 50%)`;
      } else {
        color = `rgb(${r}, ${g}, ${b})`;
      }
      
      ctx.fillStyle = color;
      ctx.fillRect(i * (barW + gap), H - h, barW, h);
      ctx.shadowBlur = 15; ctx.shadowColor = isRainbow ? color : `rgba(${r}, ${g}, ${b}, 0.8)`;
    }
    ctx.shadowBlur = 0;
  }
  
  function drawIdle(ctx, W, H) {
    const barCount = 120, gap = 2, barW = (W - gap * (barCount - 1)) / barCount;
    const [r, g, b] = getRGBFromVariable('--main-color');
    for (let i = 0; i < barCount; i++) {
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.2)`;
      ctx.fillRect(i * (barW + gap), H - 2, barW, 2);
    }
  }
  draw();
})();

  const colors = saved ? JSON.parse(saved) : { ...DEFAULT_COLORS };

            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <input type="color" value="${backgroundSettings.gradientTop}" onchange="updateBackgroundColor('top', this.value)">
              <button onclick="toggleBackgroundRainbow('top')" style="margin:0; padding: 0.3rem 0.6rem; font-size: 0.8rem; background: ${backgroundSettings.rainbowTop ? 'var(--main-color)' : '#333'}">Rainbow</button>
            </div>
          </div>
          ${backgroundSettings.rainbowTop ? `
            <div style="display: flex; align-items: center; gap: 1rem;">
              <span style="font-size: 0.8rem; opacity: 0.7;">Speed</span>
              <input type="range" min="1" max="20" value="${backgroundSettings.rainbowTopSpeed}" oninput="updateBackgroundRainbowSpeed('top', this.value)" style="flex: 1;">
            </div>
          ` : ''}
        </div>
        <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
            <span>GRADIENT BOTTOM COLOR</span>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
              <input type="color" value="${backgroundSettings.gradientBottom}" onchange="updateBackgroundColor('bottom', this.value)">
              <button onclick="toggleBackgroundRainbow('bottom')" style="margin:0; padding: 0.3rem 0.6rem; font-size: 0.8rem; background: ${backgroundSettings.rainbowBottom ? 'var(--main-color)' : '#333'}">Rainbow</button>
            </div>
          </div>
          ${backgroundSettings.rainbowBottom ? `
            <div style="display: flex; align-items: center; gap: 1rem;">
              <span style="font-size: 0.8rem; opacity: 0.7;">Speed</span>
              <input type="range" min="1" max="20" value="${backgroundSettings.rainbowBottomSpeed}" oninput="updateBackgroundRainbowSpeed('bottom', this.value)" style="flex: 1;">
            </div>
          ` : ''}
        </div>
        ${Object.entries(rainbowStates).map(([key, state]) => `
          <div style="background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px;">
            <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem;">
              <span>${key.replace('--', '').replace('-', ' ').toUpperCase()}</span>
              <div style="display: flex; gap: 0.5rem; align-items: center;">
                ${key === '--panel-color' ? 
                  `<input type="text" value="${getComputedStyle(document.documentElement).getPropertyValue(key).trim()}" onchange="updateColor('${key}', this.value)" style="width: 120px; background: #000; border: 1px solid #333; color: #fff; padding: 4px; font-size: 0.8rem;">` :
                  `<input type="color" value="${getComputedStyle(document.documentElement).getPropertyValue(key).trim()}" onchange="updateColor('${key}', this.value)">`
                }
                <button onclick="toggleRainbow('${key}')" style="margin:0; padding: 0.3rem 0.6rem; font-size: 0.8rem; background: ${state.active ? 'var(--main-color)' : '#333'}">Rainbow</button>
              </div>
            </div>
            ${state.active ? `
              <div style="display: flex; align-items: center; gap: 1rem;">
                <span style="font-size: 0.8rem; opacity: 0.7;">Speed</span>
                <input type="range" min="1" max="20" value="${state.speed}" oninput="updateRainbowSpeed('${key}', this.value)" style="flex: 1;">
              </div>
            ` : ''}
          </div>
        `).join('')}
        <button onclick="resetColors()" style="background: #440000; border: 1px solid #ff0000; margin-top: 1rem;">Reset to Defaults</button>
      </div>
    </section>
  `,
  home: `
    <section class="home-grid">
      <article class="panel hero-panel">
        <h2>Home</h2>
        <p class="lead">Welcome to GN-Neon (Goober Network). Take a look at these cats.</p>
        <div class="image-row">
          <figure class="image-card">
            <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/sili2.jpg" alt="Cat image">
            <span>sili2.jpg</span>
          </figure>
          <figure class="image-card">
            <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/sili3.jpg" alt="Cat image">
            <span>sili3.jpg</span>
          </figure>
        </div>
      </article>
    </section>
  `,
  creations: `
    <section class="panel">
      <h2>Creations</h2>
      <div class="image-row">
        <figure class="image-card">
          <img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/sili1.jpg" alt="Cat image">
          <span>sili1.jpg</span>
        </figure>
        <button class="under-construction"><span>Add New Creation</span></button>
      </div>
    </section>
  `,
  tools: `
    <section class="panel">
      <h2>Tools</h2>
      <div style="display: flex; gap: 1rem; margin-bottom: 2rem;">
        <button onclick="showCreation('paint')">Paint</button>
        <button onclick="showCreation('cipher')">Cipher</button>
        <button onclick="showCreation('chat')">AI Chat</button>
        <button onclick="showCreation('game')">Game</button>
      </div>
      <div id="toolArea"></div>
    </section>
  `
};

const toolContents = {
  paint: `
    <div class="canvas-container">
      <div class="canvas-controls">
        <input type="color" id="brushColor" value="#0000ff">
        <input type="range" id="brushSize" min="1" max="50" value="5">
        <button onclick="clearCanvas()">Clear</button>
      </div>
      <canvas id="paintingCanvas"></canvas>
    </div>
  `,
  cipher: `
    <div class="cipher-box">
      <textarea id="cipherInput" placeholder="Enter text..."></textarea>
      <div style="display: flex; gap: 1rem;">
        <button onclick="runCipher('enc')">Encrypt</button>
        <button onclick="runCipher('dec')">Decrypt</button>
      </div>
      <textarea id="cipherOutput" readonly placeholder="Result..."></textarea>
    </div>
  `,
  chat: `
    <div class="chat-container">
      <div id="chatLog"></div>
      <div class="chat-input-area">
        <input type="text" id="chatInput" placeholder="Say something...">
        <button onclick="sendChat()">Send</button>
      </div>
    </div>
  `,
  game: `
    <div class="game-box">
      <h3>Number Guess (1-100)</h3>
      <input type="number" id="guessInput" placeholder="42">
      <button onclick="checkGuess()">Guess</button>
      <p id="guessMsg"></p>
    </div>
  `
};

function load(page) {
  const content = document.getElementById('mainContent');
  content.innerHTML = pages[page];
  content.classList.remove('viz-mode');
  if(page === 'tools') showCreation('paint');
}

function showCreation(type) {
  const area = document.getElementById('toolArea');
  area.innerHTML = toolContents[type];
  if(type === 'paint') initCanvas();
  if(type === 'game') window.secretNum = Math.floor(Math.random()*100)+1;
}

function runCipher(mode) {
  const inp = document.getElementById('cipherInput').value;
  let out = "";
  for(let i=0; i<inp.length; i++) {
    let char = inp.charCodeAt(i);
    out += String.fromCharCode(mode === 'enc' ? char + 3 : char - 3);
  }
  document.getElementById('cipherOutput').value = out;
}

function sendChat() {
  const inp = document.getElementById('chatInput');
  const userVal = inp.value;
  if(!userVal) return;
  const log = document.getElementById('chatLog');
  log.innerHTML += `<div class="chat-msg user-msg">${userVal}</div>`;
  inp.value = "";
  setTimeout(()=> {
    log.innerHTML += `<div class="chat-msg bot-msg">AI demo response to: "${userVal}"</div>`;
    log.scrollTop = log.scrollHeight;
  }, 600);
}

function initCanvas() {
  const cvs = document.getElementById('paintingCanvas'), ctx = cvs.getContext('2d');
  let painting = false;
  cvs.onmousedown = (e) => { painting = true; ctx.beginPath(); ctx.moveTo(e.clientX - cvs.getBoundingClientRect().left, e.clientY - cvs.getBoundingClientRect().top); };
  cvs.onmouseup = () => { painting = false; ctx.beginPath(); };
  cvs.onmousemove = (e) => {
    if(!painting) return;
    ctx.lineWidth = document.getElementById('brushSize').value;
    ctx.lineCap = 'round';
    ctx.strokeStyle = document.getElementById('brushColor').value;
    const rect = cvs.getBoundingClientRect();
    ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
  };
}
function clearCanvas() { paintingCanvas.getContext('2d').clearRect(0,0,800,500); }
function showEmbed(url) {
  const area = document.getElementById('embedArea');
  area.style.display = 'block';
  area.innerHTML = `<iframe src="${url}"></iframe>`;
}

function checkGuess() {
  const v = parseInt(document.getElementById('guessInput').value);
  const msg = document.getElementById('guessMsg');
  if(v === window.secretNum) msg.innerText = "Correct!";
  else msg.innerText = v < window.secretNum ? "Too low!" : "Too high!";
}

// ─── BOOT ─────────────────────────────────────────────────────────────────────
function setVideoBackground(videoUrl) {
  const video = document.createElement('video');
  video.id = 'videoBg'; video.autoplay = true; video.loop = true; video.muted = true; video.src = videoUrl;
  if (!backgroundSettings.useVideo) {
    video.style.opacity = '0';
    video.style.visibility = 'hidden';
  }
  video.addEventListener('canplay', () => {
    const splash = document.getElementById('splashOverlay');
    splash.classList.add('ready');
    document.getElementById('splashText').innerText = "!!!WARNING MUSIC WILL PLAY!!!";
    document.getElementById('splashSubtext').innerText = "CLICK TO ENTER";
  });
  document.body.insertBefore(video, document.body.firstChild);
  document.body.classList.add('video-bg');
}

applySavedColors();
load("home");
setVideoBackground('https://raw.githubusercontent.com/Neon64makoto/GN-Neon/main/Files/FlatlineLoop.mp4');
initMusic();
</script>
</body>
