<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN-Neon</title>
  <style>
    :root {
      --bg: #000;
      --panel: #111;
      --panel-alt: #151515;
      --border: #333;
      --border-strong: #444;
      --text: #fff;
      --muted: #b3b3b3;
      --main-color: #0000ff;
      --panel-color: rgba(0, 50, 255, 0.25);
      --music-text: #0000ff;
      --menu-text: #0000ff;
      --shadow: 0 14px 32px rgba(0, 0, 0, 0.32);
      --panel-size: 140px;
      --bg-gradient-top: #000000;
      --bg-gradient-bottom: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-size: 16px;
    }

    body {
      background: linear-gradient(to bottom, var(--bg-gradient-top, #000), var(--bg-gradient-bottom, #000)) no-repeat fixed;
      background-size: cover;
      color: var(--text);
      font-family: Arial, sans-serif;
      transition: opacity 0.5s ease;
      min-height: 100vh;
    }

    /* Splash / Loading Overlay */
    #splashOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(45deg, #0a0a0a 25%, #1a1a2e 25%, #1a1a2e 50%, #0a0a0a 50%, #0a0a0a 75%, #1a1a2e 75%, #1a1a2e);
      background-size: 40px 40px;
      animation: loading-stripes 0.8s linear infinite;
      z-index: 2000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: opacity 0.8s ease, visibility 0.8s;
    }

    #splashOverlay.fade-out {
      opacity: 0;
      visibility: hidden;
    }

    #splashText {
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 20px var(--main-color);
      letter-spacing: 4px;
      text-align: center;
      pointer-events: none;
    }

    #splashSubtext {
      margin-top: 1rem;
      color: var(--music-text);
      font-size: 1rem;
      pointer-events: none;
    }

    #performanceModeBtn {
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      background: rgba(255, 100, 100, 0.7);
      color: #fff;
      border: 2px solid #ff6464;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s ease;
      pointer-events: auto;
    }

    #performanceModeBtn:hover {
      background: rgba(255, 100, 100, 0.9);
      box-shadow: 0 0 15px rgba(255, 100, 100, 0.8);
      transform: scale(1.05);
    }

    @keyframes loading-stripes {
      0% {
        background-position: 0 0;
      }
      100% {
        background-position: 40px 40px;
      }
    }

    /* Styled scrollbars */
    ::-webkit-scrollbar {
      width: 12px;
      height: 12px;
    }

    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--main-color);
      border-radius: 6px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--main-color);
    }

    /* Firefox scrollbar styling */
    * {
      scrollbar-color: var(--main-color) #0a0a0a;
      scrollbar-width: thin;
    }

    body.video-bg {
      position: relative;
    }

    #videoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: blur(0px);
    }

    .content-overlay {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
    }

    button,
    input, textarea {
      font: inherit;
    }

    button {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 1.25rem 2rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: var(--main-color);
      color: var(--button-text-color, white);
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease, color 0.2s ease;
    }

    button:hover {
      background: var(--main-color);
      box-shadow: 0 0 15px var(--main-color);
      transform: translateY(-2px);
    }
    
    button.under-construction {
      background: #333;
      border-color: #555;
      color: #888;
      cursor: not-allowed;
      position: relative;
    }
    
    button.under-construction:hover {
      background: #444;
      border-color: #666;
      color: #aaa;
      box-shadow: none;
      transform: none;
    }
    
    button.under-construction:hover span {
      display: none;
    }
    
    button.under-construction:hover::after {
      content: "Under Construction";
    }

    input, textarea {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 0.75rem;
      color: var(--text);
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }

    input::placeholder {
      color: #8b8b8b;
    }

    /* Styled color pickers */
    input[type="color"] {
      -webkit-appearance: none;
      border: 1px solid var(--border-strong);
      width: 40px;
      height: 40px;
      padding: 0;
      cursor: pointer;
      background: none;
    }
    input[type="color"]::-webkit-color-swatch-wrapper {
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch {
      border: none;
      border-radius: 4px;
    }

    /* ═══════════════════════════════════════════════════════════
       UNIFIED DIAGONAL PANEL LAYOUT (Opera GX style)
       ═══════════════════════════════════════════════════════════ */

    /* ─── LOGO CONNECTOR (corner piece) ─────────────────────── */
    .logo-connector {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: var(--panel-size);
      z-index: 620; /* Higher than topbar and left-panel */
      background: rgba(17, 17, 17, 0.97);
      border: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px var(--main-color), inset 0 0 15px var(--panel-color);
      transform: translate(-100%, -100%);
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 0;
      font-size: 3rem; 
    }

    .logo-connector.visible {
      transform: translate(0, 0);
      opacity: 1;
    }

    .logo-connector.ui-hidden {
      opacity: 0 !important;
      pointer-events: none !important;
      transform: translate(-100%, -100%) !important;
    }

    .logo-connector span {
      font-size: 0.55rem;
      font-weight: bold;
      color: var(--main-color);
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px var(--main-color);
      text-align: center;
      line-height: 1.1;
      user-select: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

        /* ─── LEFT PANEL (NAV) ──────────────────────────────────────── */
    .left-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: 100vh;
      z-index: 610;
      background: rgba(17, 17, 17, 0.97);
      border-right: 2px solid var(--main-color);
      border-top: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      padding-top: var(--panel-size);
      display: flex;
      flex-direction: column;
      gap: 0;
      transform: translateX(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 1;
      pointer-events: auto;
    }

    .left-panel.visible {
      transform: translateX(0);
    }

    .left-panel.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .left-panel.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .left-panel .nav {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.5rem;
      width: 100%;
    }

    .left-panel .nav button {
      width: 100%;
      text-align: left;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      margin: 0;
      background: transparent;
      border: 1px solid var(--panel-color);
      border-radius: 6px;
      color: var(--menu-text);
      transition: all 0.15s;
    }

    .left-panel .nav button:hover {
      background: var(--panel-color);
      border-color: var(--main-color);
      color: #fff;
      transform: translateX(3px);
      box-shadow: 0 0 12px var(--main-color);
    }

      /* ─── TOP PANEL (MUSIC) ──────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--panel-size);
      z-index: 610;
      background: rgba(17, 17, 17, 0.97);
      border-bottom: 2px solid var(--main-color);
      border-left: 2px solid var(--main-color);
      backdrop-filter: blur(10px);
      padding: 0.75rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding-left: var(--panel-size);
      transform: translateY(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 1;
      pointer-events: auto;
    }

    .topbar.visible {
      transform: translateY(0);
    }

    .topbar.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .topbar.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .topbar-row1 {
      width: 100%;
      display: none;
    }

    .nav {
      text-align: center;
    }

    .topbar-brand {
      display: none;
    }

    .topbar-right {
      position: absolute;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* ─── DIGITAL CLOCK (7-Segment Style) ─────────────────────────────── */
    #digitalClock {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 630;
      font-family: 'Courier New', Courier, monospace;
      font-size: 3rem;
      font-weight: bold;
      color: var(--main-color);
      text-shadow: 0 0 15px var(--main-color);
      padding: 0.6rem 1.2rem;
      background: rgba(0, 0, 0, 0.8);
      border: 2px solid var(--main-color);
      border-radius: 8px;
      text-align: center;
      display: flex;
      align-items: baseline;
      gap: 0.2rem;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px var(--panel-color);
      transform: translateY(0);
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      pointer-events: none;
      user-select: none;
    }

    #digitalClock.topbar-active {
      transform: translateY(var(--panel-size));
    }

    #digitalClock.ui-hidden {
      opacity: 0;
    }

    #digitalClock.ui-hidden.viz-persistent {
      opacity: 1;
    }

    .clock-time {
      letter-spacing: 2px;
    }

    .clock-ampm {
      font-size: 1rem;
      margin-left: 0.4rem;
      opacity: 0.8;
    }

    /* ─── HOVER TRIGGER ZONES ─────────────────────────────────────────────── */
    .trigger-zone-left {
      position: fixed;
      top: 0;
      left: 0;
      width: 50px;
      height: 100vh;
      z-index: 500;
    }

    .trigger-zone-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 50px;
      z-index: 500;
    }

    #muteBtn {
      padding: 0.6rem 0.8rem;
      font-size: 1rem;
      min-width: 60px;
    }

    /* ─── STYLIZED VOLUME SLIDER ─────────────────────────────────────── */
    #volumeSlider {
      -webkit-appearance: none;
      width: 250px;
      height: 6px;
      background: #222;
      border-radius: 3px;
      outline: none;
      border: 1px solid #333;
      cursor: pointer;
      margin-left: 0.5rem;
    }
    #volumeInput {
      width: 60px;
      padding: 0.2rem 0.4rem;
      margin: 0;
      font-size: 0.9rem;
      text-align: center;
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
      color: var(--text);
    }

    #volumeSlider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--main-color);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--main-color);
      border: 1px solid #fff;
    }

    /* ─── MUSIC CONTROLS ──────────────────────────────────────────────── */
    .music-controls {
      width: 100%;
      max-width: 780px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      border-top: 1px solid var(--panel-color);
      margin-top: 0.4rem;
    }

    .music-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1.25;
    }

    .music-title {
      font-size: 0.95rem;
      font-weight: bold;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .music-artist {
      font-size: 0.8rem;
      color: var(--music-text);
    }

    .music-btn-row {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .music-btn {
      margin: 0;
      padding: 0.35rem 0.65rem;
      font-size: 1rem;
      background: transparent;
      border: 1px solid var(--panel-color);
      border-radius: 6px;
      color: var(--menu-text);
      cursor: pointer;
      transition: all 0.15s;
      min-width: unset;
    }

    .music-btn:hover {
      background: var(--panel-color);
      transform: translateY(-1px);
      border-color: var(--main-color);
      color: #fff;
    }

    .music-btn.active-loop {
      background: var(--panel-color);
      border-color: var(--main-color);
      color: #fff;
    }

    .music-seek-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: 100%;
    }

    .music-time {
      font-size: 0.78rem;
      color: var(--music-text);
      white-space: nowrap;
      min-width: 38px;
      text-align: center;
    }

    #seekBar {
      flex: 1;
      -webkit-appearance: none;
      appearance: none;
      height: 4px;
      border-radius: 2px;
      background: linear-gradient(to right, var(--main-color) 0%, #333 0%);
      outline: none;
      cursor: pointer;
      margin: 0;
      padding: 0;
      border: none;
    }

    #seekBar::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--main-color);
      cursor: pointer;
    }

    /* ─── MAIN CONTENT ────────────────────────────────────────────────── */
    .page-shell {
      width: 100%;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 2rem;
      transition: opacity 0.4s;
    }
    .page-shell.wide-shell {
      max-width: 95vw;
    }

    .page-shell.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .site-title {
      margin: 0.5rem 0 1.5rem;
      text-align: center;
      letter-spacing: 0.04em;
      font-size: 3rem;
      color: var(--main-color);
    }

    #content {
      width: 100%;
      min-height: auto;
      padding: 1rem 0 1rem;
    }

    .panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), var(--panel-color));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 10px;
    }

    .home-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
      gap: 1.5rem;
      align-items: stretch;
    }

    .games-panel {
      background: linear-gradient(180deg, rgba(0, 0, 0, 1), var(--panel-color));
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(5px);
      padding: 10px;
      width: 90vw;
      margin-left: calc(50% - 45vw);
    }

    .games-panel h2 {
      padding: 2rem 2rem 1rem 2rem;
      margin: 0;
    }

    .games-menu {
      padding: 0 2rem 2rem 2rem;
      text-align: center;
    }

    #gamesContent {
      width: 100%;
    }

    .hero-panel h2,
    .patch-panel h3,
    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      margin-top: 0;
      font-size: 2rem;
    }

    .lead {
      color: #d2d2d2;
      line-height: 1.6;
      font-size: 1.15rem;
    }

    .image-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .image-card {
      background: var(--panel-alt);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }

    .image-card img {
      width: 100%;
      display: block;
      border-radius: 8px;
    }

    .image-card span {
      display: block;
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 1rem;
    }

    .patch-panel {
      padding: 2rem;
      position: relative;
      overflow: hidden;
      max-height: 600px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .version-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      padding: 0.5rem 0.8rem;
      border-radius: 999px;
      border: 1px solid var(--main-color);
      background: var(--panel-color);
      color: var(--main-color);
      font-size: 0.9rem;
    }

    .patch-list {
      margin: 1rem 0 0;
      padding-left: 1.5rem;
      line-height: 1.65;
      font-size: 0.95rem;
    }

    .patch-list li + li {
      margin-top: 0.75rem;
    }

    .section-copy {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .calc-panel,
    .games-panel,
    .about-panel {
      padding: 2rem;
    }

    .calc-panel h2,
    .games-panel h2,
    .about-panel h2 {
      font-size: 2rem;
    }

    .calc-panel h3,
    .games-panel h3,
    .about-panel h3 {
      font-size: 1.5rem;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    #scratchFrame {
      width: 100%;
      height: 55vh;
      border: none;
      border-radius: 10px;
      background: #000;
    }

    .games-layout {
      display: flex;
      gap: 0.75rem;
      align-items: flex-start;
      justify-content: center;
      width: 100%;
      padding: 0.5rem 1rem 1rem 1rem;
      margin: 0;
      box-sizing: border-box;
    }

    .games-menu {
      text-align: center;
    }

    .games-menu button {
      display: block;
      width: 40%;
      margin: 0.5rem auto;
      font-size: 1rem;
      padding: 0.75rem 1rem;
    }

    .back-button {
      display: block;
      margin: 0.5rem auto 1rem;
      font-size: 0.9rem;
      padding: 0.5rem 1rem;
    }

    .wip-container {
      text-align: center;
      padding: 2rem 1rem;
    }

    .wip-container h2 {
      font-size: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .wip-container p {
      color: #b3b3b3;
      font-size: 1rem;
    }

    .sideBox {
      width: 18%;
      padding: 1rem;
      background: #111;
      border: 1px solid #333;
      border-radius: 10px;
      overflow-y: auto;
      height: 55vh;
      box-shadow: var(--shadow);
      font-size: 0.9rem;
    }

    .centerBox {
      width: 50%;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      flex-shrink: 0;
    }

    .sideBox {
      flex-shrink: 0;
    }

    #gameControls,
    #gameNotes {
      white-space: pre-line;
      color: #ddd;
      line-height: 1.5;
      font-size: 0.95rem;
    }

    .canvas-wrap {
      position: relative;
      display: inline-block;
    }

    #grid {
      border: 1px solid white;
      background: #000;
    }

    #axesLabels {
      position: absolute;
      font-size: 0.8em;
      color: #ccc;
    }

    #graphResults {
      margin-top: 1rem;
      padding: 1rem;
      background: #0e0e0e;
      border: 1px solid var(--border);
      border-radius: 10px;
      text-align: left;
      font-size: 1.05rem;
    }

    .version-tag {
      position: fixed;
      bottom: 5px;
      right: 10px;
      color: gray;
      font-size: 0.85rem;
      z-index: 200;
      transition: opacity 0.4s;
    }

    .version-tag.ui-hidden {
      opacity: 0;
    }

    /* ─── AUDIO VISUALIZER ────────────────────────────────────────────── */
    #visualizerCanvas {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 175vh;
      z-index: -1;
      pointer-events: none;
      display: block;
    }

    /* ─── NEW TOOLS & SECTIONS ─────────────────────────────────────────── */
    .embed-container { width: 100%; height: 80vh; border-radius: 12px; overflow: hidden; border: 1px solid #333; margin-top: 1rem; }
    .embed-container iframe { width: 100%; height: 100%; border: none; }
    #ideContainer { display: flex; flex-direction: row; gap: 1rem; height: 400px; }
    #ideInput { flex: 1; height: 100%; background: #111; color: #0f0; font-family: monospace; margin: 0; }

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let currentIndex = 0;
let isMuted = false;
let currentTrack = 0;
let isLooping = false;
let seekDragging = false;
let isVisualizerMode = false;
let keepClockInViz = false;

const DEFAULT_COLORS = {
  '--main-color': '#0000ff',
  '--panel-color': 'rgba(0, 50, 255, 0.25)',
  '--music-text': '#0000ff',
  '--menu-text': '#0000ff'
};

// Memory for colors before rainbow
let preRainbowColors = { ...DEFAULT_COLORS };

let rainbowStates = {
  '--main-color': { active: false, speed: 5 },
  '--music-text': { active: false, speed: 5 },
  '--menu-text': { active: false, speed: 5 },
  '--panel-color': { active: false, speed: 5 }
};

function applySongColor(trackIndex) {
  if (!songColorEnabled) return;
  const color = songColors[trackIndex] || '#0000ff';
  document.documentElement.style.setProperty('--main-color', color);
  document.documentElement.style.setProperty('--music-text', color);
  document.documentElement.style.setProperty('--menu-text', color);
  const rgb = parseInt(color.slice(1), 16);
  const r = (rgb >> 16) & 255;
  const g = (rgb >> 8) & 255;
  const b = rgb & 255;
  document.documentElement.style.setProperty('--panel-color', `rgba(${r}, ${g}, ${b}, 0.25)`);
}

function toggleSongColor() {
  songColorEnabled = !songColorEnabled;
  localStorage.setItem('gn_neon_song_color', songColorEnabled.toString());
  if (songColorEnabled) {
    applySongColor(currentTrack);
  } else {
    const saved = localStorage.getItem('gn_neon_colors');
    const colors = saved ? JSON.parse(saved) : { ...DEFAULT_COLORS };
    document.documentElement.style.setProperty('--main-color', colors['--main-color']);
    document.documentElement.style.setProperty('--music-text', colors['--music-text']);
    document.documentElement.style.setProperty('--menu-text', colors['--menu-text']);
    document.documentElement.style.setProperty('--panel-color', colors['--panel-color']);
  }
  const buttons = document.querySelectorAll(`button[onclick="toggleSongColor()"]`);
  buttons.forEach(btn => {
    btn.style.background = songColorEnabled ? 'var(--main-color)' : '#333';
    const mainColorValue = getComputedStyle(document.documentElement).getPropertyValue('--main-color').trim();
    const brightness = getColorBrightness(mainColorValue);
    btn.style.color = songColorEnabled ? (brightness > 128 ? '#000' : '#fff') : '#888';
    btn.style.borderColor = songColorEnabled ? 'var(--main-color)' : '#555';
    btn.textContent = songColorEnabled ? 'Enabled' : 'Disabled';
  });
}

let backgroundSettings = {
  useVideo: true,
  gradientTop: '#000000',
  gradientBottom: '#000000',
  rainbowTop: false,
  rainbowBottom: false,
  rainbowTopSpeed: 5,
  rainbowBottomSpeed: 5,
  customBg: null
};

function updateRainbow() {
  const time = Date.now() / 1000;
  for (const [key, state] of Object.entries(rainbowStates)) {
    if (state.active) {
      const hue = (time * state.speed * 10) % 360;
      if (key === '--panel-color') {
        document.documentElement.style.setProperty(key, `hsla(${hue}, 100%, 50%, 0.15)`);
      } else {
        document.documentElement.style.setProperty(key, `hsl(${hue}, 100%, 50%)`);
      }
    }
  }
  if (backgroundSettings.rainbowTop) {
    const hueTop = (time * backgroundSettings.rainbowTopSpeed * 10) % 360;
    const color = `hsl(${hueTop}, 100%, 50%)`;
    document.documentElement.style.setProperty('--bg-gradient-top', color);
    document.body.style.setProperty('--bg-gradient-top', color);
  }
  if (backgroundSettings.rainbowBottom) {
    const hueBottom = (time * backgroundSettings.rainbowBottomSpeed * 10) % 360;
    const color = `hsl(${hueBottom}, 100%, 50%)`;
    document.documentElement.style.setProperty('--bg-gradient-bottom', color);
    document.body.style.setProperty('--bg-gradient-bottom', color);
  }
  requestAnimationFrame(updateRainbow);
}
updateRainbow();

// ─── CLOCK LOGIC (7-Segment, 12h, No Seconds) ──────────────────────────────────
function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  
  h = h % 12;
  h = h ? h : 12;
  const hStr = String(h).padStart(2, '0');
  
  document.getElementById('clockTime').innerText = `${hStr}:${m}`;
  document.getElementById('clockAmPm').innerText = ampm;
}
setInterval(updateClock, 1000);
updateClock();

// ─── PLAYLIST ────────────────────────────────────────────────────────────────
const playlist = [
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Super%20Mario%20RPG.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Neon%20Cobra.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Disco%20Pervert.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/They%20Live!.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/One%20Night%20In%20Tokyo.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/A%20Kind%20of%20Deutsch.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Military%20Fashion%20Show.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Hotline%20-%20Original%20Mix.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Strange%20Timez%20(feat.%20Robert%20Smith).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Not%20Like%20Us.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Notion.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Write%20This%20Down.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Temporary%20Love%20(feat.%20CG5).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Falling%20Down.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Why%20Cant%20This%20Be%20Easy.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/But%20Can%20You%20Do%20This.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Philly%20Nice%20(B-Side).mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Pain_is_just_freddy_fazbear.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/dq%20blizzard.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/MC%20Chris%20Is%20Dead.mp3',
  'https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Neon@main/Music/Super%20Mario%20RPG%20Waltz%20of%20the%20Forest%20(4K).mp3'
];

const trackMeta = [
  { title: 'SMRPG Rawest Forrest', artist: 'Martin Hagwell' },
  { title: 'Neon Cobra', artist: 'Shockwave-Sound' },
  { title: 'Disco Pervert', artist: 'Nightstop' },
  { title: 'They Live!', artist: 'Evil Nine' },
  { title: 'One Night In Tokyo', artist: 'Beast in Black' },
  { title: 'A Kind of Deutsch', artist: 'And One' },
  { title: 'Military Fashion Show', artist: 'And One' },
  { title: 'Hotline', artist: 'Jasper Byrne' },
  { title: 'Strange Timez', artist: 'Gorillaz' },
  { title: 'Not Like Us', artist: 'Kendrick Lamar' },
  { title: 'Notion', artist: 'The Rare Occasions' },
  { title: 'Write This Down', artist: 'SoulChef' },
  { title: 'Temporary Love', artist: 'The Living Tombstone' },
  { title: 'Falling Down', artist: 'Space Cowboy' },
  { title: 'Why Cant This be Easy', artist: 'Red Vox' },
  { title: 'But Can You Do This', artist: 'Lolnein' },
  { title: 'Philly Nice (B-Side)', artist: 'Rozebud' },
  { title: 'FNAF 1 (trust)', artist: 'Silva Gunner' },
  { title: 'DQ Blizzard', artist: 'MC Chris' },
  { title: 'MC Chris is Dead', artist: 'MC Chris' },
  { title: 'SMRPG Waltz of The Forest', artist: 'Psyguy' }
];

const songColors = [
  '#ff0000', '#ff00ff', '#8400ff', '#00ff00', '#0000ff', '#ff0000', '#ff8800', '#8400ff', '#00ccff', '#ff0000', '#ff4800', '#ffe100', '#0000ff', '#0084ff', '#00ccff', '#ffff00', '#ea00ff', '#ff7300', '#ffffff', '#00ff00', '#ff0000'
];

let songColorEnabled = false;

// ─── SPLASH LOGIC ────────────────────────────────────────────────────────────
function enablePerformanceMode(event) {
  event.stopPropagation();
  for (const key in rainbowStates) {
    rainbowStates[key].active = false;
  }
  backgroundSettings.useVideo = false;
  localStorage.setItem('gn_neon_rainbow', JSON.stringify(rainbowStates));
  localStorage.setItem('gn_neon_bg_settings', JSON.stringify(backgroundSettings));
  const videoBg = document.getElementById('videoBg');
  if (videoBg) {
    videoBg.style.opacity = '0';
    videoBg.style.visibility = 'hidden';
  }
  const overlay = document.getElementById('splashOverlay');
  overlay.classList.add('fade-out');
  ensureAudioContext();
  const audio = document.getElementById('bgMusic');
  audio.play().catch(e => console.warn("Audio start blocked:", e));
}

function enterSite() {
  const overlay = document.getElementById('splashOverlay');
  if (overlay.classList.contains('ready')) {
    overlay.classList.add('fade-out');
    ensureAudioContext();
    const audio = document.getElementById('bgMusic');
    audio.play().catch(e => console.warn("Audio start blocked:", e));
  }
}

// ─── AUDIO ENGINE ────────────────────────────────────────────────────────────
let audioCtx = null, analyser = null, sourceNode = null, audioContextReady = false;

function ensureAudioContext() {
  if (audioContextReady) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
  const audio = document.getElementById('bgMusic');
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    audioContextReady = true;
  } catch (e) { console.warn(e); }
}

function initMusic() {
  const audio = document.getElementById('bgMusic');
  
  // Load saved music state
  const savedTrack = localStorage.getItem('gn_neon_track');
  const savedTime = localStorage.getItem('gn_neon_time');
  const savedVolume = localStorage.getItem('gn_neon_volume');
  const savedMute = localStorage.getItem('gn_neon_mute');

  if (savedTrack !== null) currentTrack = parseInt(savedTrack);
  audio.src = playlist[currentTrack];
  
  if (savedVolume !== null) {
    audio.volume = parseFloat(savedVolume);
    document.getElementById('volumeSlider').value = audio.volume * 100;
    document.getElementById('volumeInput').value = Math.round(audio.volume * 100);
  } else {
    audio.volume = 0.5;
  }

  if (savedMute === 'true') {
    isMuted = true;
    audio.muted = true;
    document.getElementById('muteBtn').innerText = 'Unmute';
  }

  if (savedTime !== null) {
    audio.addEventListener('loadedmetadata', () => {
      audio.currentTime = parseFloat(savedTime);
    }, { once: true });
  }

  audio.addEventListener('ended', () => isLooping ? (audio.currentTime = 0, audio.play()) : musicNext());
  audio.addEventListener('timeupdate', () => {
    if (!seekDragging) {
      const seekBar = document.getElementById('seekBar');
      seekBar.value = (audio.currentTime / audio.duration) * 100;
      seekBar.style.background = `linear-gradient(to right, var(--main-color) ${seekBar.value}%, #333 ${seekBar.value}%)`;
      document.getElementById('mcCurrent').innerText = fmtTime(audio.currentTime);
      localStorage.setItem('gn_neon_time', audio.currentTime);
    }
  });
  audio.addEventListener('durationchange', () => {
    document.getElementById('mcDuration').innerText = fmtTime(audio.duration);
  });
  updateTrackDisplay();
}

function updateTrackDisplay() {
  const meta = trackMeta[currentTrack];
  document.getElementById('mcTitle').innerText = meta.title;
  document.getElementById('mcArtist').innerText = meta.artist;
  document.getElementById('mcPlayPause').innerText = '▮▮';
  localStorage.setItem('gn_neon_track', currentTrack);
  applySongColor(currentTrack);
}

function fmtTime(s) { const m = Math.floor(s/60), sec = Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }

function musicPlayPause() { 
  const a = document.getElementById('bgMusic'); 
  ensureAudioContext(); 
  if (a.paused) {
    a.play();
    document.getElementById('mcPlayPause').innerText = '▮▮';
  } else {
    a.pause();
    document.getElementById('mcPlayPause').innerText = '▶';
  }
}
function musicNext() { currentTrack = (currentTrack + 1) % playlist.length; const a = document.getElementById('bgMusic'); a.src = playlist[currentTrack]; updateTrackDisplay(); applySongColor(currentTrack); a.play(); }
function musicPrev() { const a = document.getElementById('bgMusic'); if(a.currentTime > 3) a.currentTime = 0; else currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; a.src = playlist[currentTrack]; updateTrackDisplay(); applySongColor(currentTrack); a.play(); }
function musicToggleLoop() { isLooping = !isLooping; document.getElementById('mcLoop').classList.toggle('active-loop', isLooping); }
function musicSeek(v) { const a = document.getElementById('bgMusic'); seekDragging = true; a.currentTime = (v/100)*a.duration; setTimeout(()=>seekDragging=false, 200); }
function setVolume(v) {
  const audio = document.getElementById('bgMusic');
  audio.volume = v / 100;
  document.getElementById('volumeInput').value = v;
  document.getElementById('volumeSlider').value = v;
  if (v > 0) { isMuted = false; document.getElementById('muteBtn').innerText = "Mute"; }
  localStorage.setItem('gn_neon_volume', audio.volume);
  localStorage.setItem('gn_neon_mute', isMuted);
}
function setVolumeFromInput(v) {
  let val = parseInt(v);
  if (isNaN(val)) val = 0;
  if (val > 100) val = 100;
  if (val < 0) val = 0;
  setVolume(val);
}
function toggleMute() { 
  isMuted = !isMuted; 
  const b = document.getElementById('muteBtn'); 
  b.innerText = isMuted ? 'Unmute' : 'Mute'; 
  document.querySelectorAll('audio').forEach(a => a.muted = isMuted);
  localStorage.setItem('gn_neon_mute', isMuted);
}

// ─── VISUALIZER MODE ──────────────────────────────────────────────────────────
function toggleVisualizerMode() {
  isVisualizerMode = !isVisualizerMode;
  const main = document.getElementById('mainContent');
  const top = document.getElementById('topbar');
  const left = document.getElementById('leftPanel');
  const logo = document.getElementById('logoConnector');
  const tag = document.getElementById('vTag');
  const btn = document.getElementById('vizModeBtn');
  const clock = document.getElementById('digitalClock');

  if (isVisualizerMode) {
    main.classList.add('ui-hidden');
    top.classList.add('ui-hidden');
    left.classList.add('ui-hidden');
    logo.classList.add('ui-hidden'); // Change 1: Hide logo in visualizer mode
    tag.classList.add('ui-hidden');
    btn.innerText = "Exit Mode";
    clock.classList.add('ui-hidden');
    if (keepClockInViz) {
      clock.classList.add('viz-persistent');
    }
    document.addEventListener('keydown', exitVizOnEsc);
  } else {
    main.classList.remove('ui-hidden');
    top.classList.remove('ui-hidden');
    left.classList.remove('ui-hidden');
    logo.classList.remove('ui-hidden');
    tag.classList.remove('ui-hidden');
    btn.innerText = "Visualizer";
    top.classList.remove('hover-reveal');
    left.classList.remove('hover-reveal');
    clock.classList.remove('ui-hidden');
    clock.classList.remove('viz-persistent');

  const clock = document.getElementById('digitalClock');
  const triggerLeft = document.querySelector('.trigger-zone-left');
  const triggerTop = document.querySelector('.trigger-zone-top');
  
  let hideTimer = null;

  const showBoth = () => { 
    topbar.classList.add('visible'); 
    leftPanel.classList.add('visible');
    // Change 1 Fix: Only show logo if NOT in visualizer mode
    if (!isVisualizerMode) {
      logoConnector.classList.add('visible');

    if (isVisualizerMode) { 
      topbar.classList.add('hover-reveal');
      leftPanel.classList.add('hover-reveal');
    }
    clearTimeout(hideTimer); 
  };
  
  const hideBoth = () => { 
    if(!topbar.matches(':hover') && !leftPanel.matches(':hover') && !logoConnector.matches(':hover')) {
      topbar.classList.remove('visible'); 
      leftPanel.classList.remove('visible');
      logoConnector.classList.remove('visible');

  triggerTop.addEventListener('mouseenter', showBoth);
  topbar.addEventListener('mouseenter', showBoth);
  leftPanel.addEventListener('mouseenter', showBoth);
  logoConnector.addEventListener('mouseenter', showBoth);
  
  document.addEventListener('mousemove', (e) => {
    if (e.clientX < 8 || e.clientY < 8) { 
      showBoth(); 
    }

      if(!topbar.matches(':hover') && !leftPanel.matches(':hover') && !logoConnector.matches(':hover')) {

// ─── VISUALIZER ──────────────────────────────────────────────────────────────
(function() {
  const canvas = document.getElementById('visualizerCanvas');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  function getRGBFromVariable(varName) {
    const val = getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
    if (val.startsWith('#')) {
      const r = parseInt(val.slice(1, 3), 16), g = parseInt(val.slice(3, 5), 16), b = parseInt(val.slice(5, 7), 16);
      return [r, g, b];
    } else if (val.startsWith('rgb')) {
      const match = val.match(/\d+/g);
      return [parseInt(match[0]), parseInt(match[1]), parseInt(match[2])];
    }
    return [0, 0, 255];
  }

  function draw() {
    requestAnimationFrame(draw);
    ctx.clearRect(0, 0, W, H);
    if (!audioContextReady || !analyser) { drawIdle(ctx, W, H); return; }
    const data = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    const barCount = 80, gap = 4, barW = (W - gap * (barCount - 1)) / barCount;
    const [r, g, b] = getRGBFromVariable('--main-color');
    const isRainbow = rainbowStates['--main-color'].active;
    const time = Date.now() / 1000;
    
    for (let i = 0; i < barCount; i++) {
      const val = data[i * 2] || 0;
      const h = (val / 255) * (H * 0.4);
      const opacity = 0.3 + (val / 255) * 0.7;
      
      let color;
      if (isRainbow) {
        const hue = (time * rainbowStates['--main-color'].speed * 10 + (i * 2)) % 360;
        color = `hsla(${hue}, 100%, 50%, ${opacity})`;
      } else {
        color = `rgba(${r}, ${g}, ${b}, ${opacity})`;
      }
      
      ctx.fillStyle = color;
      ctx.fillRect(i * (barW + gap), H - h, barW, h);
      ctx.shadowBlur = 15; ctx.shadowColor = isRainbow ? color : `rgba(${r}, ${g}, ${b}, 0.8)`;
    }
    ctx.shadowBlur = 0;
  }
  
  function drawIdle(ctx, W, H) {
    const barCount = 120, gap = 2, barW = (W - gap * (barCount - 1)) / barCount;
    const [r, g, b] = getRGBFromVariable('--main-color');
    for (let i = 0; i < barCount; i++) {
      ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 0.2)`;
      ctx.fillRect(i * (barW + gap), H - 2, barW, 2);
    }
  }
  draw();
})();

function updateBackgroundGradient() {
  if (!backgroundSettings.rainbowTop) {
    document.documentElement.style.setProperty('--bg-gradient-top', backgroundSettings.gradientTop);
    document.body.style.setProperty('--bg-gradient-top', backgroundSettings.gradientTop);
  }
  if (!backgroundSettings.rainbowBottom) {
    document.documentElement.style.setProperty('--bg-gradient-bottom', backgroundSettings.gradientBottom);
    document.body.style.setProperty('--bg-gradient-bottom', backgroundSettings.gradientBottom);
  }
  // Change 3: Apply custom background if exists
  if (backgroundSettings.customBg) {
    document.body.style.backgroundImage = `url(${backgroundSettings.customBg})`;
    document.body.style.backgroundSize = 'cover';
    document.body.style.backgroundAttachment = 'fixed';
  } else {
    document.body.style.backgroundImage = `linear-gradient(to bottom, var(--bg-gradient-top), var(--bg-gradient-bottom))`;
  }
}

function toggleBackgroundVideo() {

function applySavedColors() {
  const saved = localStorage.getItem('gn_neon_colors');
  if (saved) {
    const colors = JSON.parse(saved);
    preRainbowColors = { ...colors }; // Change 2: Store pre-rainbow memory
    for (const [key, val] of Object.entries(colors)) {
      document.documentElement.style.setProperty(key, val);
    }
  }
  const savedRainbow = localStorage.getItem('gn_neon_rainbow');
  if (savedRainbow) {
    rainbowStates = JSON.parse(savedRainbow);
  }
  const savedClockSetting = localStorage.getItem('gn_neon_keep_clock');
  if (savedClockSetting !== null) {
    keepClockInViz = savedClockSetting === 'true';
  }
  const savedBgSettings = localStorage.getItem('gn_neon_bg_settings');
  if (savedBgSettings) {
    backgroundSettings = JSON.parse(savedBgSettings);
    updateBackgroundGradient();
  }
  const savedSongColor = localStorage.getItem('gn_neon_song_color');
  if (savedSongColor !== null) {
    songColorEnabled = savedSongColor === 'true';
    if (songColorEnabled) {
      applySongColor(currentTrack);
    }
  }
  updateSettingsButtonAppearances();
}

function updateColor(key, val) {
  if (rainbowStates[key]) rainbowStates[key].active = false;
  preRainbowColors[key] = val; // Change 2: Update memory on manual change
  document.documentElement.style.setProperty(key, val);
  const saved = localStorage.getItem('gn_neon_colors');
  const colors = saved ? JSON.parse(saved) : { ...DEFAULT_COLORS };
  colors[key] = val;
  localStorage.setItem('gn_neon_colors', JSON.stringify(colors));
  saveRainbow();
  updateSettingsButtonAppearances(); // Ensure UI updates
}

function toggleRainbow(key) {
  rainbowStates[key].active = !rainbowStates[key].active;
  // Change 2: Revert to pre-rainbow color when disabling
  if (!rainbowStates[key].active) {
    const colorToRestore = preRainbowColors[key] || DEFAULT_COLORS[key];
    document.documentElement.style.setProperty(key, colorToRestore);
  }
  saveRainbow();
  updateSettingsButtonAppearances();
}

function updateRainbowSpeed(key, speed) {
  rainbowStates[key].speed = parseFloat(speed);
  saveRainbow();
}

function saveRainbow() {
  localStorage.setItem('gn_neon_rainbow', JSON.stringify(rainbowStates));
}
function toggleKeepClock() {
  keepClockInViz = !keepClockInViz;
  localStorage.setItem('gn_neon_keep_clock', keepClockInViz);
  updateSettingsButtonAppearances();
}

function resetColors() {
  for (const [key, val] of Object.entries(DEFAULT_COLORS)) {
    document.documentElement.style.setProperty(key, val);
  }
  for (const key in rainbowStates) rainbowStates[key].active = false;
  preRainbowColors = { ...DEFAULT_COLORS };
  
  backgroundSettings = {
    useVideo: true,
    gradientTop: '#000000',
    gradientBottom: '#000000',
    rainbowTop: false,
    rainbowBottom: false,
    rainbowTopSpeed: 5,
    rainbowBottomSpeed: 5,
    customBg: null
  };
  updateBackgroundGradient();
  const videoBg = document.getElementById('videoBg');
  if (videoBg) {
    videoBg.style.opacity = '1';
    videoBg.style.visibility = 'visible';
  }
  
  localStorage.removeItem('gn_neon_colors');
  localStorage.removeItem('gn_neon_rainbow');
  localStorage.removeItem('gn_neon_bg_settings');
  load('settings');
}

// Change 4: Dictionary API function
async function searchDictionary() {
  const word = document.getElementById('dictInput').value.trim();
  const resultsDiv = document.getElementById('dictResults');
  if (!word) return;
  resultsDiv.innerHTML = 'Searching...';
  try {
    const response = await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
    if (!response.ok) throw new Error('Word not found');
    const data = await response.json();
    const entry = data[0];
    let html = `<div style="font-size: 1.5rem; color: var(--main-color);">${entry.word}</div>`;
    if (entry.phonetic) html += `<div style="font-style: italic; opacity: 0.7;">${entry.phonetic}</div>`;
    entry.meanings.forEach(m => {
      html += `<div style="margin-top: 1rem; border-left: 2px solid var(--main-color); padding-left: 1rem;">
        <div style="font-weight: bold; color: var(--music-text); text-transform: uppercase; font-size: 0.8rem;">${m.partOfSpeech}</div>
        <div style="margin-top: 5px;">${m.definitions[0].definition}</div>
      </div>`;
    });
    resultsDiv.innerHTML = html;
  } catch (e) {
    resultsDiv.innerHTML = `<div style="color: #ff6464;">Error: ${e.message}</div>`;
  }
}

function getColorBrightness(hexColor) {
  const hex = hexColor.replace('#', '');
  const r = parseInt(hex.slice(0, 2), 16);
  const g = parseInt(hex.slice(2, 4), 16);
  const b = parseInt(hex.slice(4, 6), 16);
  return (r * 299 + g * 587 + b * 114) / 1000;
}

function updateNavButtonTextColor() {
  const mainColorValue = getComputedStyle(document.documentElement).getPropertyValue('--main-color').trim();
  const brightness = getColorBrightness(mainColorValue);
  const textColor = brightness > 128 ? '#000' : '#fff';
  document.documentElement.style.setProperty('--button-text-color', textColor);
  const navButtons = document.querySelectorAll('.left-panel .nav button');
  navButtons.forEach(btn => {
    if (btn.style.background === 'var(--main-color)' || btn.style.background.includes('rgb')) {
      btn.style.color = textColor;
    }
  });
}

setInterval(updateNavButtonTextColor, 1000);

function load(page) {
  if (isVisualizerMode) {
    toggleVisualizerMode();
  }
  const main = document.getElementById('mainContent');
  if (page !== 'home' && page !== 'games') {
    main.classList.add('wide-shell');
  } else {
    main.classList.remove('wide-shell');
  }
  document.getElementById("content").innerHTML = pages[page];
  if (page === 'settings') {
    setTimeout(() => updateSettingsButtonAppearances(), 50);
  }
  const navButtons = document.querySelectorAll('.left-panel .nav button');
  navButtons.forEach(btn => {
    btn.style.background = 'transparent';
    btn.style.color = 'var(--menu-text)';
    btn.style.borderColor = 'var(--panel-color)';
  });
  const pageButtonMap = {
    'home': 0,
    'tools': 1,
    'games': 2,
    'creations': 3,
    'about': 4
  };
  const buttonIndex = pageButtonMap[page];
  if (buttonIndex !== undefined && navButtons[buttonIndex]) {
    navButtons[buttonIndex].style.background = 'var(--main-color)';
    const mainColorValue = getComputedStyle(document.documentElement).getPropertyValue('--main-color').trim();
    const brightness = getColorBrightness(mainColorValue);
    const textColor = brightness > 128 ? '#000' : '#fff';
    navButtons[buttonIndex].style.color = textColor;
    document.documentElement.style.setProperty('--button-text-color', textColor);
    navButtons[buttonIndex].style.borderColor = 'var(--main-color)';
  }
  if (page === 'games') {
    setTimeout(() => {
      const gamesMenu = document.querySelector('.games-menu');
      if (gamesMenu) gamesMenu.style.display = 'block';
    }, 0);
  }
}

function enterRun(e, fn) {
  if (e.key === "Enter") fn();
}

function showTool(type) {
  const area = document.getElementById("toolArea"), toolsMenu = document.getElementById("toolsMenu");
  if (toolsMenu) toolsMenu.style.display = 'none';
  if (type === 'calc') {
    area.innerHTML = `<button class="back-button" onclick="load('tools')">← Back to Tools</button><h3>Calculators</h3><div class="games-menu"><button onclick="showCalc('simple')">Simple</button><button onclick="showCalc('volume')">Volume</button><button onclick="showCalc('graph')">Graph</button></div><div id="calcArea"></div>`;
  } else if (type === 'ide') {
    area.innerHTML = `<button class="back-button" onclick="load('tools')">← Back to Tools</button><h3>HTML IDE</h3><div id="ideContainer"><textarea id="ideInput" placeholder="Write HTML/CSS/JS here..." oninput="runIDE()"></textarea><iframe id="ideOutput"></iframe></div>`;
  } else if (type === 'chat') {
    area.innerHTML = `<button class="back-button" onclick="load('tools')">← Back to Tools</button><h3>AI Chatbot</h3><div id="chatContainer"><div id="chatLog"></div><div class="chat-input-row"><input id="chatInput" placeholder="Ask something..." onkeydown="if(event.key==='Enter')sendChat()"><button onclick="sendChat()">Send</button></div></div>`;
  } else if (type === 'canvas') {
    area.innerHTML = `<button class="back-button" onclick="load('tools')">← Back to Tools</button><h3>Painting Canvas</h3><canvas id="paintingCanvas" width="800" height="500"></canvas><div style="text-align:center; margin-top:1rem;"><input type="color" id="brushColor" value="#0000ff"><input type="range" id="brushSize" min="1" max="50" value="5"><button onclick="clearCanvas()">Clear</button></div>`;
    initCanvas();
  } else if (type === 'ciphers') {
    area.innerHTML = `<button class="back-button" onclick="load('tools')">← Back to Tools</button><h3>Ciphers</h3><div class="games-menu"><button onclick="showCipher('caesar')">Caesar</button><button onclick="showCipher('atbash')">Atbash</button></div><div id="cipherArea"></div>`;
  } else if (type === 'dict') {
    area.innerHTML = `<button class="back-button" onclick="load('tools')">← Back to Tools</button><h3>Dictionary</h3><div style="display: flex; gap: 0.5rem;"><input type="text" id="dictInput" placeholder="Enter a word..." style="flex: 1;" onkeydown="if(event.key==='Enter') searchDictionary()"><button onclick="searchDictionary()" style="margin:0; padding: 0.5rem 1rem;">Search</button></div><div id="dictResults" style="margin-top: 1rem; background: rgba(255,255,255,0.05); padding: 1rem; border-radius: 8px; max-height: 300px; overflow-y: auto;">Results will appear here...</div>`;
  } else if (type === 'guess') {
    area.innerHTML = `<button class="back-button" onclick="load('games')">← Back to Games</button><h3>Number Guessing</h3><p>Guess a number between 1 and 100:</p><input id="guessInput" type="number"><button onclick="checkGuess()">Guess</button><p id="guessMsg"></p>`;
    window.secretNum = Math.floor(Math.random() * 100) + 1;
  }
}

function showCalc(type) {
  const c = document.getElementById("calcArea");
  if (type === "simple") {
    c.innerHTML = `<h3>Simple Calculator</h3><input id="simpleInput" placeholder="2+2*3" onkeydown="enterRun(event, calcSimple)"><button onclick="calcSimple()">Calc</button><p id="simpleOut"></p>`;
  } else if (type === "volume") {
    c.innerHTML = `<h3>Volume Calculator</h3>Cube (Side): <input id="cubeSide" onkeydown="enterRun(event, volCube)"><button onclick="volCube()">Calc</button><p id="cubeOut"></p>Sphere (Radius): <input id="sphereR" onkeydown="enterRun(event, volSphere)"><button onclick="volSphere()">Calc</button><p id="sphereOut"></p>Rectangular Prism (L, W, H): <input id="recL" placeholder="Length" onkeydown="enterRun(event, volRect)"><input id="recW" placeholder="Width" onkeydown="enterRun(event, volRect)"><input id="recH" placeholder="Height" onkeydown="enterRun(event, volRect)"><button onclick="volRect()">Calc</button><p id="rectOut"></p>Cylinder (R, H): <input id="cylR" placeholder="Radius" onkeydown="enterRun(event, volCyl)"><input id="cylH" placeholder="Height" onkeydown="enterRun(event, volCyl)"><button onclick="volCyl()">Calc</button><p id="cylOut"></p>Pyramid (Base, Height): <input id="pyrB" placeholder="Base Area" onkeydown="enterRun(event, volPyr)"><input id="pyrH" placeholder="Height" onkeydown="enterRun(event, volPyr)"><button onclick="volPyr()">Calc</button><p id="pyrOut"></p>`;
  } else if (type === "graph") {
    c.innerHTML = `<h3>Graph Calculator</h3>X: <input id="xmin" value="-10"> to <input id="xmax" value="10"><br>Y: <input id="ymin" value="-10"> to <input id="ymax" value="10"><br><br>y=<input id="eq1" onkeydown="enterRun(event, drawGraph)"><br>y=<input id="eq2" onkeydown="enterRun(event, drawGraph)"><br>y=<input id="eq3" onkeydown="enterRun(event, drawGraph)"><br>y=<input id="eq4" onkeydown="enterRun(event, drawGraph)"><br>y=<input id="eq5" onkeydown="enterRun(event, drawGraph)"><br><br><button onclick="drawGraph()">Graph</button><br><br><div class="canvas-wrap"><canvas id="grid" width="400" height="400"></canvas><div id="axesLabels"></div></div>`;
  }
}

function calcSimple() { const i = document.getElementById("simpleInput"), o = document.getElementById("simpleOut"); try { o.innerText = eval(i.value); } catch { o.innerText = "Error"; } }
function volCube() { const v = parseFloat(cubeSide.value); cubeOut.innerText = !isNaN(v) ? v ** 3 : "Invalid"; }
function volSphere() { const v = parseFloat(sphereR.value); sphereOut.innerText = !isNaN(v) ? (4 / 3) * Math.PI * v ** 3 : "Invalid"; }
function volRect() { const l = parseFloat(recL.value), w = parseFloat(recW.value), h = parseFloat(recH.value); rectOut.innerText = !isNaN(l) && !isNaN(w) && !isNaN(h) ? l * w * h : "Invalid"; }
function volCyl() { const r = parseFloat(cylR.value), h = parseFloat(cylH.value); cylOut.innerText = !isNaN(r) && !isNaN(h) ? Math.PI * r * r * h : "Invalid"; }
function volPyr() { const b = parseFloat(pyrB.value), h = parseFloat(pyrH.value); pyrOut.innerText = !isNaN(b) && !isNaN(h) ? (1 / 3) * b * h : "Invalid"; }

function drawGraph() {
  const canvas = document.getElementById('grid'), ctx = canvas.getContext('2d');
  const xmin = parseFloat(document.getElementById('xmin').value), xmax = parseFloat(document.getElementById('xmax').value);
  const ymin = parseFloat(document.getElementById('ymin').value), ymax = parseFloat(document.getElementById('ymax').value);
  const eqs = [eq1.value, eq2.value, eq3.value, eq4.value, eq5.value].filter(e => e.trim() !== "");
  const colors = ['#00ff00', '#ff0000', '#0000ff', '#ffff00', '#ff00ff'];
  ctx.clearRect(0, 0, 400, 400);
  ctx.strokeStyle = '#444'; ctx.lineWidth = 1;
  const zeroX = (0 - xmin) * 400 / (xmax - xmin), zeroY = 400 - (0 - ymin) * 400 / (ymax - ymin);
  ctx.beginPath(); ctx.moveTo(zeroX, 0); ctx.lineTo(zeroX, 400); ctx.moveTo(0, zeroY); ctx.lineTo(400, zeroY); ctx.stroke();
  eqs.forEach((eq, idx) => {
    ctx.strokeStyle = colors[idx]; ctx.lineWidth = 2; ctx.beginPath();
    for (let i = 0; i <= 400; i++) {
      const x = xmin + i * (xmax - xmin) / 400;
      try {
        const y = eval(eq.replace(/x/g, `(${x})`).replace(/Math\./g, '').replace(/sin/g, 'Math.sin').replace(/cos/g, 'Math.cos').replace(/tan/g, 'Math.tan').replace(/sqrt/g, 'Math.sqrt').replace(/pow/g, 'Math.pow').replace(/PI/g, 'Math.PI').replace(/E/g, 'Math.E').replace(/abs/g, 'Math.abs').replace(/log/g, 'Math.log'));
        const canvasY = 400 - (y - ymin) * 400 / (ymax - ymin);
        if (i === 0) ctx.moveTo(i, canvasY); else ctx.lineTo(i, canvasY);
      } catch (e) { }
    }
    ctx.stroke();
  });
}

function runIDE() {
  const input = document.getElementById('ideInput').value, output = document.getElementById('ideOutput');
  output.srcdoc = input;
}

function initCanvas() {
  const canvas = document.getElementById('paintingCanvas'), ctx = canvas.getContext('2d');
  let drawing = false;
  canvas.onmousedown = () => drawing = true; canvas.onmouseup = () => { drawing = false; ctx.beginPath(); };
  canvas.onmousemove = (e) => {
    if (!drawing) return;
    ctx.lineWidth = document.getElementById('brushSize').value; ctx.lineCap = 'round'; ctx.strokeStyle = document.getElementById('brushColor').value;
    const rect = canvas.getBoundingClientRect(); ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top); ctx.stroke(); ctx.beginPath(); ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
  };
}
function clearCanvas() { const c = document.getElementById('paintingCanvas'); c.getContext('2d').clearRect(0, 0, c.width, c.height); }

function showCipher(type) {
  const area = document.getElementById("cipherArea");
  if (type === 'caesar') {
    area.innerHTML = `<h4>Caesar Cipher</h4>Text: <input id="caesarIn"><br>Shift: <input id="caesarShift" type="number" value="3"><br><button onclick="runCaesar(true)">Encrypt</button><button onclick="runCaesar(false)">Decrypt</button><p id="caesarOut"></p>`;
  } else if (type === 'atbash') {
    area.innerHTML = `<h4>Atbash Cipher</h4>Text: <input id="atbashIn"><br><button onclick="runAtbash()">Convert</button><p id="atbashOut"></p>`;
  }
}
function runCaesar(enc) {
  const text = caesarIn.value, shift = parseInt(caesarShift.value) * (enc ? 1 : -1);
  caesarOut.innerText = text.split('').map(c => {
    if (c.match(/[a-z]/i)) {
      const code = c.charCodeAt(0), base = code < 91 ? 65 : 97;
      return String.fromCharCode((code - base + shift + 26) % 26 + base);
    } return c;
  }).join('');
}
function runAtbash() {
  atbashOut.innerText = atbashIn.value.split('').map(c => {
    if (c.match(/[a-z]/i)) {
      const code = c.charCodeAt(0), base = code < 91 ? 65 : 97;
      return String.fromCharCode(25 - (code - base) + base);
    } return c;
  }).join('');
}

function checkGuess() {
  const val = parseInt(guessInput.value);
  if (val === secretNum) guessMsg.innerText = "Correct! New number generated."; secretNum = Math.floor(Math.random() * 100) + 1;
  else guessMsg.innerText = val < secretNum ? "Higher!" : "Lower!";
}

function showScratchGames() {
  const content = document.getElementById("gamesContent"), menu = document.getElementById("gamesMenu");
  menu.style.display = 'none';
  content.innerHTML = `<button class="back-button" onclick="load('games')">← Back to Games</button><div class="games-menu"><button onclick="launchScratch('10128431')">The Ninja</button><button onclick="launchScratch('11654051')">Appel</button></div><div id="scratchArea"></div>`;
}
function launchScratch(id) {
  document.getElementById("scratchArea").innerHTML = `<iframe id="scratchFrame" src="https://scratch.mit.edu/projects/${id}/embed" allowtransparency="true" width="485" height="402" frameborder="0" scrolling="no" allowfullscreen></iframe>`;
}

  initMusic();
  applySavedColors();
  load('home');
  
  const logo = document.getElementById('logoConnector');

  const top = document.getElementById('topbar');
  
  setTimeout(() => {
    logo.classList.add('visible');
    left.classList.add('visible');
    top.classList.add('visible');
    document.getElementById('splashOverlay').classList.add('ready');
    document.getElementById('splashText').innerText = 'CLICK TO ENTER';
    document.getElementById('splashSubtext').innerText = 'System Initialized';
  }, 1500);

  // Background initialization
  if (!backgroundSettings.useVideo) {
    const videoBg = document.getElementById('videoBg');
    if (videoBg) { videoBg.style.opacity = '0'; videoBg.style.visibility = 'hidden'; }
  }
  updateBackgroundGradient();
};
