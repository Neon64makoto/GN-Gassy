<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GN-Neon</title>
  <style>
    :root {
      --text: #aac0ff;
      --border: rgba(0, 0, 200, 0.2);
      --border-strong: rgba(0, 0, 200, 0.5);
      --panel-size: 120px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'Courier New', monospace;
      background: #000;
      color: var(--text);
      overflow: hidden;
    }

    body {
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
    }

    body.video-bg {
      background: none;
      position: relative;
    }

    #videoBg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
      filter: blur(0px);
    }

    .content-overlay {
      position: relative;
      z-index: 1;
      background: rgba(0, 0, 0, 0.85);
      min-height: 100vh;
    }

    button,
    input, textarea {
      font: inherit;
    }

    button {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 1.25rem 2rem;
      border: 1px solid transparent;
      border-radius: 4px;
      background: #0900ad;
      color: white;
      cursor: pointer;
      transition: background 0.16s ease, border-color 0.16s ease, transform 0.16s ease;
    }

    button:hover {
      background: #0044ff;
      border-color: #1100ff;
      box-shadow: 0 0 35px rgba(0, 0, 255, 0.95);
      transform: translateY(-1px);
    }

    input, textarea {
      margin: 0.5rem;
      font-size: 1.1rem;
      padding: 0.75rem 0.75rem;
      color: var(--text);
      background: #0c0c0c;
      border: 1px solid var(--border-strong);
      border-radius: 4px;
    }

    input::placeholder {
      color: #8b8b8b;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #0044ff;
      box-shadow: 0 0 15px rgba(0, 68, 255, 0.5);
    }

    textarea {
      resize: vertical;
      font-family: 'Courier New', monospace;
    }

    /* ═══════════════════════════════════════════════════════════
       UNIFIED DIAGONAL PANEL LAYOUT (Opera GX style)
       ═══════════════════════════════════════════════════════════ */

    /* ─── LOGO CONNECTOR (square corner piece) ──────────────────── */
    .logo-connector {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: var(--panel-size);
      z-index: 120;
      background: rgba(17, 17, 17, 0.97);
      border: 2px solid #0044ff;
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(0, 68, 255, 0.5), inset 0 0 15px rgba(0, 68, 255, 0.2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .logo-connector.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .logo-connector span {
      font-size: 0.55rem;
      font-weight: bold;
      color: #0600ff;
      letter-spacing: 0.5px;
      text-shadow: 0 0 10px rgba(0, 6, 255, 0.9);
      text-align: center;
      line-height: 1.1;
      user-select: none;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

        /* ─── LEFT PANEL (NAV) ──────────────────────────────────────── */
    .left-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: var(--panel-size);
      height: 100vh;
      z-index: 110;
      background: rgba(17, 17, 17, 0.97);
      border-right: 2px solid #0044ff;
      border-top: 2px solid #0044ff;
      backdrop-filter: blur(10px);
      padding-top: var(--panel-size);
      display: flex;
      flex-direction: column;
      gap: 0;
      transform: translateX(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 0;
      pointer-events: none;

    }

    .left-panel.visible {
      transform: translateX(0);
      opacity: 1;
      pointer-events: auto;
    }

    .left-panel.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }
    
    .left-panel.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }

    .left-panel .nav {
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
      padding: 0.5rem;
      width: 100%;
    }

    .left-panel .nav button {
      width: 100%;
      text-align: left;
      padding: 0.6rem 0.8rem;
      font-size: 0.95rem;
      margin: 0;
      background: transparent;
      border: 1px solid rgba(0, 0, 200, 0.3);
      border-radius: 6px;
      color: #aac0ff;
      transition: all 0.15s;
    }

    .left-panel .nav button:hover {
      background: rgba(0, 0, 255, 0.2);
      border-color: #0044ff;
      color: #fff;
      transform: translateX(3px);
      box-shadow: 0 0 12px rgba(0, 68, 255, 0.4);
    }

      /* ─── TOP PANEL (MUSIC) ──────────────────────────────────────── */
    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: var(--panel-size);
      z-index: 110;
      background: rgba(17, 17, 17, 0.97);
      border-bottom: 2px solid #0044ff;
      border-left: 2px solid #0044ff;
      backdrop-filter: blur(10px);
      padding: 0.75rem 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      padding-left: var(--panel-size);
      transform: translateY(calc(-1 * var(--panel-size)));
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.35s;
      opacity: 0;
      pointer-events: none;

    }

    .topbar.visible {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .topbar.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }

    .topbar.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .topbar-row1 {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    .music-controls {
      display: flex;
      gap: 1rem;
      align-items: center;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    .music-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
      text-align: center;
    }

    .music-title {
      font-size: 0.9rem;
      color: #0044ff;
      font-weight: bold;
    }

    .music-artist {
      font-size: 0.75rem;
      color: var(--text);
    }

    .music-btn-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      justify-content: center;
    }

    .music-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      background: rgba(0, 0, 200, 0.3);
      border: 1px solid rgba(0, 0, 200, 0.5);
      border-radius: 4px;
      color: #aac0ff;
      cursor: pointer;
      transition: all 0.15s;
    }

    .music-btn:hover {
      background: rgba(0, 0, 255, 0.5);
      border-color: #0044ff;
      color: #fff;
      box-shadow: 0 0 10px rgba(0, 68, 255, 0.4);
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .volume-slider {
      width: 80px;
      height: 4px;
      border-radius: 2px;
      background: rgba(0, 0, 200, 0.3);
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #0044ff;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(0, 68, 255, 0.6);
    }

    .volume-slider::-moz-range-thumb {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #0044ff;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(0, 68, 255, 0.6);
    }

    .mute-btn {
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      background: rgba(0, 0, 200, 0.3);
      border: 1px solid rgba(0, 0, 200, 0.5);
      border-radius: 4px;
      color: #aac0ff;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mute-btn:hover {
      background: rgba(0, 0, 255, 0.5);
      border-color: #0044ff;
      color: #fff;
      box-shadow: 0 0 10px rgba(0, 68, 255, 0.4);
    }

    .topbar-brand {
      display: none;
    }

    .topbar-right {
      position: absolute;
      right: 1.5rem;
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    /* ─── INTERLOCKING TRIANGLE ELEMENTS ─────────────────────────────── */
    /* Logo top-right protruding triangle */
    .logo-tri-top-right {
      position: fixed;
      top: 0;
      left: var(--panel-size);
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 var(--panel-size) var(--panel-size) 0;
      border-color: transparent rgba(17, 17, 17, 0.97) transparent transparent;
      z-index: 121;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .logo-tri-top-right.visible {
      opacity: 1;
    }

    /* Logo bottom-left protruding triangle */
    .logo-tri-bottom-left {
      position: fixed;
      top: var(--panel-size);
      left: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 0 var(--panel-size) var(--panel-size);
      border-color: transparent transparent rgba(17, 17, 17, 0.97) transparent;
      z-index: 121;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .logo-tri-bottom-left.visible {
      opacity: 1;
    }

    /* Nav panel top-right connecting triangle */
    .nav-tri-top-right {
      position: fixed;
      top: 0;
      left: var(--panel-size);
      width: 0;
      height: 0;
      border-style: solid;
      border-width: var(--panel-size) 0 0 var(--panel-size);
      border-color: transparent transparent transparent rgba(17, 17, 17, 0.97);
      z-index: 111;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .nav-tri-top-right.visible {
      opacity: 1;
    }

    /* Music panel top-left connecting triangle */
    .music-tri-top-left {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 0 var(--panel-size) var(--panel-size) 0;
      border-color: transparent rgba(17, 17, 17, 0.97) transparent transparent;
      z-index: 111;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .music-tri-top-left.visible {
      opacity: 1;
    }

    /* ─── HOVER TRIGGER ZONES ────────────────────────────────────── */
    .trigger-zone-left {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 100vh;
      z-index: 500;
    }

    .trigger-zone-top {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 6px;
      z-index: 500;
    }

    #mainContent {
      position: relative;
      z-index: 1;
      padding-top: 0;
      padding-left: 0;
      margin-top: 0;
      margin-left: 0;
      transition: opacity 0.3s ease;
    }

    #mainContent.ui-hidden {
      opacity: 0;
      pointer-events: none;
    }

    #mainContent.ui-hidden.hover-reveal {
      opacity: 1;
      pointer-events: auto;
    }

    .page-shell {
      padding: 2rem;
      max-width: 1400px;
      margin: 0 auto;
    }

    .page-shell h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      color: #0044ff;
      text-shadow: 0 0 20px rgba(0, 68, 255, 0.5);
    }

    .page-shell p {
      line-height: 1.6;
      margin-bottom: 1rem;
      color: var(--text);
    }

    .page-shell a {
      color: #0044ff;
      text-decoration: none;
      transition: text-shadow 0.2s;
    }

    .page-shell a:hover {
      text-shadow: 0 0 10px rgba(0, 68, 255, 0.7);
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .sideBox {
      background: rgba(0, 0, 200, 0.1);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 1.5rem;
      margin: 1.5rem 0;
      color: var(--text);
    }

    .sideBox h3 {
      color: #0044ff;
      margin-bottom: 1rem;
    }

    .sideBox ul {
      list-style: none;
      padding-left: 0;
    }

    .sideBox li {
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }

    .sideBox li:last-child {
      border-bottom: none;
    }

    .sideBox li a {
      color: #0044ff;
      text-decoration: none;
      transition: all 0.2s;
    }

    .sideBox li a:hover {
      color: #fff;
      text-shadow: 0 0 10px rgba(0, 68, 255, 0.7);
    }

    .games-layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .game-card {
      background: rgba(0, 0, 200, 0.15);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }

    .game-card:hover {
      background: rgba(0, 0, 255, 0.25);
      border-color: #0044ff;
      box-shadow: 0 0 20px rgba(0, 68, 255, 0.4);
      transform: translateY(-5px);
    }

    .game-card h3 {
      color: #0044ff;
      margin-bottom: 0.5rem;
    }

    .game-card p {
      font-size: 0.9rem;
      color: var(--text);
    }

    .creations-layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .creation-card {
      background: rgba(0, 0, 200, 0.15);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
    }

    .creation-card:hover {
      border-color: #0044ff;
      box-shadow: 0 0 20px rgba(0, 68, 255, 0.4);
      transform: translateY(-5px);
    }

    .creation-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
    }

    .creation-card h3 {
      color: #0044ff;
      padding: 1rem 1rem 0.5rem;
      margin: 0;
    }

    .creation-card p {
      padding: 0 1rem 1rem;
      margin: 0;
      font-size: 0.9rem;
      color: var(--text);
    }

    .tools-layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .tool-card {
      background: rgba(0, 0, 200, 0.15);
      border: 1px solid var(--border-strong);
      border-radius: 8px;
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.3s;
    }

    .tool-card:hover {
      background: rgba(0, 0, 255, 0.25);
      border-color: #0044ff;
      box-shadow: 0 0 20px rgba(0, 68, 255, 0.4);
    }

    .tool-card h3 {
      color: #0044ff;
      margin-bottom: 0.5rem;
    }

    .tool-card p {
      font-size: 0.9rem;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .tool-card button {
      width: 100%;
    }

    #splashOverlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: pointer;
    }

    #splashText {
      font-size: 3rem;
      color: #0044ff;
      text-shadow: 0 0 30px rgba(0, 68, 255, 0.8);
      margin-bottom: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
    }

    #splashSubtext {
      font-size: 1.2rem;
      color: var(--text);
      text-shadow: 0 0 15px rgba(0, 68, 255, 0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .vTag {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      background: rgba(0, 0, 200, 0.3);
      border: 1px solid #0044ff;
      border-radius: 4px;
      padding: 0.5rem 1rem;
      color: #0044ff;
      font-size: 0.9rem;
      z-index: 100;
      pointer-events: none;
    }

    .vTag.ui-hidden {
      display: none;
    }

    @media (max-width: 768px) {
      .page-shell h1 {
        font-size: 1.8rem;
      }

      .button-row {
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      button {
        margin: 0.3rem;
        font-size: 0.9rem;
        padding: 0.5rem 0.6rem;
      }

      input {
        margin: 0.3rem;
        font-size: 0.9rem;
        padding: 0.5rem 0.5rem;
      }

      .sideBox {
        padding: 0.75rem;
        font-size: 0.85rem;
      }

      #scratchFrame {
        height: 40vh;
      }

      .games-layout {
        gap: 0.5rem;
      }

      .creations-layout {
        gap: 0.5rem;
      }

      .tools-layout {
        gap: 0.5rem;
      }
    }
  </style>
</head>
<body>
  <audio id="bgMusic" style="display:none;" crossorigin="anonymous"></audio>

  <!-- Click to Enter Splash -->
  <div id="splashOverlay" onclick="enterSite()">
    <div id="splashText">LOADING...</div>
    <div id="splashSubtext">Please wait for the assets to load</div>
  </div>

  <!-- Hover trigger zones -->
  <div class="trigger-zone-left"></div>
  <div class="trigger-zone-top"></div>

  <!-- Logo connector piece (diagonal) -->
  <div class="logo-connector" id="logoConnector">
    <span>GN<br>NEON</span>
  </div>

  <!-- Interlocking triangles -->
  <div class="logo-tri-top-right" id="logoTriTopRight"></div>
  <div class="logo-tri-bottom-left" id="logoTriBottomLeft"></div>
  <div class="nav-tri-top-right" id="navTriTopRight"></div>
  <div class="music-tri-top-left" id="musicTriTopLeft"></div>

  <!-- Left panel (nav) -->
  <div class="left-panel" id="leftPanel">
    <nav class="nav" aria-label="Primary">
      <button onclick="load('home')">Home</button>
      <button onclick="load('tools')">Tools</button>
      <button onclick="load('games')">Games</button>
      <button onclick="load('creations')">Creations</button>
      <button onclick="load('about')">About</button>
      <button onclick="toggleVisualizerMode()" id="vizModeBtn" style="border: 1px solid #0044ff; background: rgba(0,0,255,0.1);">Visualizer</button>
    </nav>
  </div>

  <!-- Top panel (music) -->
  <div class="topbar" id="topbar">
    <div class="topbar-row1"></div>
    <div class="music-controls">
      <div class="music-info">
        <span class="music-title" id="mcTitle">Super Mario RPG</span>
        <span class="music-artist" id="mcArtist">Yoko Shimomura</span>
      </div>
      <div class="music-btn-row">
        <button class="music-btn" onclick="musicPrev()" title="Previous">&#9664;&#9664;</button>
        <button class="music-btn" id="mcPlayPause" onclick="musicPlayPause()" title="Play/Pause">&#9646;&#9646;</button>
        <button class="music-btn" onclick="musicNext()" title="Next">&#9654;&#9654;</button>
      </div>
      <div class="volume-control">
        <span style="font-size: 0.9rem;">Vol:</span>
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)">
        <button class="mute-btn" id="muteBtn" onclick="toggleMute()" title="Mute">🔊</button>
      </div>
    </div>
  </div>

  <!-- Main content -->
  <div class="content-overlay">
    <div id="mainContent">
      <div class="page-shell" id="pageShell"></div>
    </div>
  </div>

  <div class="vTag" id="vTag">VISUALIZER MODE</div>

  <script>
    let currentPage = 'home';
    let isVisualizerMode = false;
    let isMuted = false;
    let currentVolume = 50;

    const musicPlaylist = [
      { title: 'Super Mario RPG', artist: 'Yoko Shimomura', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' },
      { title: 'The Legend of Zelda', artist: 'Koji Kondo', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3' },
      { title: 'Final Fantasy VII', artist: 'Nobuo Uematsu', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3' },
      { title: 'Chrono Trigger', artist: 'Yasunori Mitsuda', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3' },
      { title: 'Castlevania', artist: 'Michiru Yamane', url: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3' }
    ];

    let currentTrack = 0;

    function load(page) {
      currentPage = page;
      renderPage();
    }

    function renderPage() {
      const shell = document.getElementById('pageShell');
      const content = getPageContent(currentPage);
      shell.innerHTML = content;
    }

    function getPageContent(page) {
      const pages = {
        home: `

    function toggleVisualizerMode() {
      isVisualizerMode = !isVisualizerMode;
      const main = document.getElementById('mainContent');
      const top = document.getElementById('topbar');
      const left = document.getElementById('leftPanel');
      const logo = document.getElementById('logoConnector');
      const tag = document.getElementById('vTag');
      const btn = document.getElementById('vizModeBtn');

      if (isVisualizerMode) {
        main.classList.add('ui-hidden');
        top.classList.add('ui-hidden');
        left.classList.add('ui-hidden');
        logo.style.opacity = '0';
        logo.style.pointerEvents = 'none';
        tag.classList.add('ui-hidden');
        btn.innerText = "Exit Mode";
        document.addEventListener('keydown', exitVizOnEsc);
      } else {
        main.classList.remove('ui-hidden');
        top.classList.remove('ui-hidden');
        left.classList.remove('ui-hidden');
        logo.style.opacity = '';
        logo.style.pointerEvents = '';
        tag.classList.remove('ui-hidden');
        btn.innerText = "Visualizer";
        top.classList.remove('hover-reveal');
        left.classList.remove('hover-reveal');
        document.removeEventListener('keydown', exitVizOnEsc);
      }
    }
    function exitVizOnEsc(e) { if(e.key === 'Escape') toggleVisualizerMode(); }

    // ─── UNIFIED PANEL HOVER REVEAL ───────────────────────────────────────────────
    (function() {
      const topbar = document.getElementById('topbar');
      const leftPanel = document.getElementById('leftPanel');
      const logoConnector = document.getElementById('logoConnector');
      const logoTriTopRight = document.getElementById('logoTriTopRight');
      const logoTriBottomLeft = document.getElementById('logoTriBottomLeft');
      const navTriTopRight = document.getElementById('navTriTopRight');
      const musicTriTopLeft = document.getElementById('musicTriTopLeft');
      const triggerLeft = document.querySelector('.trigger-zone-left');
      const triggerTop = document.querySelector('.trigger-zone-top');
      
      let hideTimer = null;
      let isNear = false;

      const showBoth = () => { 
        topbar.classList.add('visible'); 
        leftPanel.classList.add('visible');
        logoConnector.classList.add('visible');
        logoTriTopRight.classList.add('visible');
        logoTriBottomLeft.classList.add('visible');
        navTriTopRight.classList.add('visible');
        musicTriTopLeft.classList.add('visible');
        if (isVisualizerMode) { 
          topbar.classList.add('hover-reveal');
          leftPanel.classList.add('hover-reveal');
        }
        clearTimeout(hideTimer); 
      };
      
      const hideBoth = () => { 
        if(!isNear) {
          topbar.classList.remove('visible'); 
          leftPanel.classList.remove('visible');
          logoConnector.classList.remove('visible');
          logoTriTopRight.classList.remove('visible');
          logoTriBottomLeft.classList.remove('visible');
          navTriTopRight.classList.remove('visible');
          musicTriTopLeft.classList.remove('visible');
          if (isVisualizerMode) { 
            topbar.classList.remove('hover-reveal');
            leftPanel.classList.remove('hover-reveal');
          }
        }
      };

      // Trigger zones
      triggerLeft.addEventListener('mouseenter', showBoth);
      triggerTop.addEventListener('mouseenter', showBoth);
      
      // Panel hover
      topbar.addEventListener('mouseenter', showBoth);
      leftPanel.addEventListener('mouseenter', showBoth);
      
      // Mouse move tracking
      document.addEventListener('mousemove', (e) => {
        if (e.clientX < 8 || e.clientY < 8) { isNear = true; showBoth(); } 
        else { 
          isNear = false; 
          if(!topbar.matches(':hover') && !leftPanel.matches(':hover')) { 
            clearTimeout(hideTimer); 
            hideTimer = setTimeout(hideBoth, 500); 
          } 
        }
      });
      
      // Hide on leave
      topbar.addEventListener('mouseleave', () => {
        if(!leftPanel.matches(':hover')) {
          clearTimeout(hideTimer);
          hideTimer = setTimeout(hideBoth, 500);
        }
      });
      leftPanel.addEventListener('mouseleave', () => {
        if(!topbar.matches(':hover')) {
          clearTimeout(hideTimer);
          hideTimer = setTimeout(hideBoth, 500);
        }
      });
    })();

    // ─── MUSIC PLAYER ─────────────────────────────────────────────────────────────
    function loadTrack(index) {
      const track = musicPlaylist[index];
      const audio = document.getElementById('bgMusic');
      audio.src = track.url;
      document.getElementById('mcTitle').innerText = track.title;
      document.getElementById('mcArtist').innerText = track.artist;
      audio.play();
      updatePlayPauseBtn();
    }

    function musicPlayPause() {
      const audio = document.getElementById('bgMusic');
      if (audio.paused) {
        audio.play();
      } else {
        audio.pause();
      }
      updatePlayPauseBtn();
    }

    function updatePlayPauseBtn() {
      const audio = document.getElementById('bgMusic');
      const btn = document.getElementById('mcPlayPause');
      btn.innerText = audio.paused ? '▶' : '⏸';
    }

    function musicNext() {
      currentTrack = (currentTrack + 1) % musicPlaylist.length;
      loadTrack(currentTrack);
    }

    function musicPrev() {
      currentTrack = (currentTrack - 1 + musicPlaylist.length) % musicPlaylist.length;
      loadTrack(currentTrack);
    }

    function setVolume(value) {
      currentVolume = value;
      const audio = document.getElementById('bgMusic');
      audio.volume = value / 100;
      if (value > 0) isMuted = false;
      updateMuteBtn();
    }

    function toggleMute() {
      const audio = document.getElementById('bgMusic');
      isMuted = !isMuted;
      audio.muted = isMuted;
      updateMuteBtn();
    }

    function updateMuteBtn() {
      const btn = document.getElementById('muteBtn');
      btn.innerText = isMuted ? '🔇' : '🔊';
    }

    function enterSite() {
      document.getElementById('splashOverlay').style.display = 'none';
      renderPage();
      loadTrack(0);
    }
  </script>
