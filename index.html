<html>
<head>
<title>GN-Gassy</title>
<meta charset="UTF-8">

<style>
body { background:black; color:white; font-family:Arial,sans-serif; margin:0; padding:0; }

input { margin:4px; font-size:1em; }
button { margin:4px; font-size:1em; padding:8px 12px; border:none; border-radius:4px; background:#444; color:white; cursor:pointer; }
button:hover { background:#666; }

#scratchFrame { width:80vw; height:70vh; border:none; }

#content {
  width: 100%;
  height: calc(100vh - 150px);
  box-sizing: border-box;
  padding: 20px;
}

#axesLabels {
  position: absolute;
  font-size: 0.9em;
  color: #ccc;
}

@media(max-width: 800px){
  body { font-size: 1.2em; }
}
</style>
</head>

<body>

<!-- NAV BAR -->
<div style="text-align:center; padding:10px; background:#111; border-bottom:1px solid #333;">
  <button onclick="load('home')">Home</button>
  <button onclick="load('calc')">Calculators</button>
  <button onclick="load('games')">Games</button>
  <button onclick="load('about')">About</button>
</div>

<h1 style="text-align:center;">GN-Gassy</h1>
<div id="content">Loading...</div>

<div style="position:fixed; bottom:5px; right:10px; color:gray; font-size:12px;">
  v0.13
</div>

<script>
// ------------- PAGES -------------
const pages = {

home: `
<h2>Home</h2>
<p>Welcome to GN-Gassy.</p>
<img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili2.jpg" width="200" style="border-radius:8px;"><br><br>
<img src="https://cdn.jsdelivr.net/gh/Neon64makoto/GN-Gassy@main/sili3.jpg" width="200" style="border-radius:8px;">
`,

calc: `
<h2>Calculators</h2>
<button onclick="showCalc('simple')">Simple</button>
<button onclick="showCalc('volume')">Volume</button>
<button onclick="showCalc('graph')">Graph</button>
<div id="calcArea"></div>
`,

games: `
<h2>Scratch Games</h2>
<div style="text-align:center;">
<button onclick="prevGame()">◀</button>
<button onclick="nextGame()">▶</button>
<br><br>
<iframe id="scratchFrame"></iframe>
<h3 id="gameTitle"></h3>
</div>
`,

about: `
<h2>About</h2>
<p>This is GN-Gassy.</p>
`
};

// Load page
function load(page){
  document.getElementById("content").innerHTML = pages[page];

  if(page==='games'){
    currentIndex = 0;
    updateGame();
  }
}

// ------------- CALCULATORS -------------
function showCalc(type){
  const c = document.getElementById('calcArea');

  if(type==="simple"){
    c.innerHTML = `
      <h3>Simple Calculator</h3>
      <input id="simpleInput" placeholder="2+2*3">
      <button onclick="calcSimple()">Calc</button>
      <p id="simpleOut"></p>
    `;
  }

  else if(type==='volume'){
    c.innerHTML = `
      <h3>Volume Calculator</h3>

      Cube: <input id="cubeSide" style="width:80px;">
      <button onclick="volCube()">Calc</button>
      <p id="cubeOut"></p>

      Sphere: <input id="sphereR" style="width:80px;">
      <button onclick="volSphere()">Calc</button>
      <p id="sphereOut"></p>

      Rect: 
      <input id="recL" style="width:60px;">
      <input id="recW" style="width:60px;">
      <input id="recH" style="width:60px;">
      <button onclick="volRect()">Calc</button>
      <p id="rectOut"></p>
    `;
  }

  else if(type==='graph'){
    c.innerHTML = `
      <h3>Graph Calculator</h3>

      X: <input id="xmin" value="-10" style="width:50px;">
      to <input id="xmax" value="10" style="width:50px;"><br>

      Y: <input id="ymin" value="-10" style="width:50px;">
      to <input id="ymax" value="10" style="width:50px;"><br><br>

      y=<input id="eq1" placeholder="x*x" style="width:150px;"><br><br>

      <button onclick="drawGraph()">Graph</button><br><br>

      <div style="position: relative;">
        <canvas id="grid" width="400" height="400" style="border:1px solid white;"></canvas>
        <div id="axesLabels"></div>
      </div>
    `;
  }
}

function calcSimple(){
  const val = document.getElementById('simpleInput').value;
  try {
    document.getElementById('simpleOut').innerText = eval(val);
  } catch {
    document.getElementById('simpleOut').innerText = "Error";
  }
}

// Volume
function volCube(){
  const v = parseFloat(cubeSide.value);
  cubeOut.innerText = !isNaN(v) ? v**3 : "Invalid";
}

function volSphere(){
  const v = parseFloat(sphereR.value);
  sphereOut.innerText = !isNaN(v) ? (4/3*Math.PI*v**3) : "Invalid";
}

function volRect(){
  const l = parseFloat(recL.value);
  const w = parseFloat(recW.value);
  const h = parseFloat(recH.value);
  rectOut.innerText = (!isNaN(l)&&!isNaN(w)&&!isNaN(h)) ? l*w*h : "Invalid";
}

// ------------- GAMES -------------
const games = [
  {title:"Game 1", url:"https://scratch.mit.edu/projects/10128407/embed"},
  {title:"Game 2", url:"https://scratch.mit.edu/projects/10128515/embed"}
];

let currentIndex = 0;

function updateGame(){
  document.getElementById('scratchFrame').src = games[currentIndex].url;
  document.getElementById('gameTitle').innerText = games[currentIndex].title;
}

function nextGame(){ currentIndex = (currentIndex+1)%games.length; updateGame(); }
function prevGame(){ currentIndex = (currentIndex-1+games.length)%games.length; updateGame(); }

// ------------- GRAPH -------------
function drawGraph(){
  const canvas = document.getElementById('grid');
  const ctx = canvas.getContext('2d');

  ctx.clearRect(0,0,canvas.width,canvas.height);

  const xmin = parseFloat(xmin.value);
  const xmax = parseFloat(xmax.value);
  const ymin = parseFloat(ymin.value);
  const ymax = parseFloat(ymax.value);

  ctx.strokeStyle="white";

  const xZero = (-xmin)/(xmax-xmin)*canvas.width;
  ctx.beginPath(); ctx.moveTo(xZero,0); ctx.lineTo(xZero,400); ctx.stroke();

  const yZero = (ymax)/(ymax-ymin)*canvas.height;
  ctx.beginPath(); ctx.moveTo(0,yZero); ctx.lineTo(400,yZero); ctx.stroke();
}

// INIT
load("home");

</script>

</body>
</html>
